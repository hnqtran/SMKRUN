    description: Whitespace-separated list of YYYYMMDD dates denoting spin-up days.
  SRCABBR:
    default: ''
    description: Used to define or pass values to $SECTOR, $SUBSECT. Set up scripting
      environment variables prior to calling the Assigns file
  TIMELOG:
    default: ''
    description: Path to the logging file used by the timetracker script to monitor
      SMOKE processing runtimes.
  TIMELOG_YN:
    default: ''
    description: Boolean (Y/N) flag to enable or disable duration tracking into the
      TIMELOG file.
  TLABEL:
    default: ''
    description: Used to define or pass values to $argv[4], $argv[5], $argv[6], $argv[3].
