directory_definitions.csh:
  ASSIGNS_FILE:
    default: ''
    description: Path to the SMOKE Assigns environment file.
  CASE:
    default: ''
    description: The emissions modeling scenario or case name (e.g., 2016v1, 2022v2).
  DAT_ROOT:
    default: ''
    description: Root directory path for creating local input or working directories.
  EMF_CLIENT:
    default: ''
    description: Path to the EMF client executable used for sending job status signals
      to the EMF server.
  EMF_JOBID:
    default: ''
    description: The numerical database Job ID tracking this payload in the EMF.
  EMF_JOBKEY:
    default: ''
    description: The unique EMF job identifier key used to communicate statuses with
      the EMF client server.
  EMF_JOBNAME:
    default: ''
    description: Text string corresponding to the user-entered name for the EMF job.
  GE_DAT:
    default: ''
    description: Directory path pointing to the root of the speciation profiles and
      cross-reference files.
  GRID:
    default: ''
    description: The target grid abbreviation used primarily for output file naming
      conventions (e.g., 36US1, 12US2).
  IMD_ROOT:
    default: ''
    description: Root path for intermediate working directories.
  INSTALL_DIR:
    default: ''
    description: Full path indicating the SMOKE executable or scripts installation
      directory.
  MET_ROOT:
    default: ''
    description: Root directory path pointing to the meteorology files (e.g., MCIP
      outputs).
  OUT_ROOT:
    default: ''
    description: Top-tier output directory root.
  PROJECT_ROOT:
    default: ''
    description: Root path defining the base tier of the SMOKE modeling platform project.
  RUNSET:
    default: ''
    description: Path to a run-settings configuration file containing batch parameters.
  SECTOR:
    default: ''
    description: The emission sector abbreviation currently being processed (e.g.,
      ptegu, onroad, nonroad).
  SMK_HOME:
    default: ''
    description: Base directory for the SMOKE installation.
qa_run_v10.csh:
  CASE:
    default: ''
    description: The emissions modeling scenario or case name (e.g., 2016v1, 2022v2).
  D:
    default: ''
    description: Day of the month (e.g., 01, 31). Usually generated in day-looping
      scripts.
  DEBUGMODE:
    default: ''
    description: Boolean (Y/N) flag to activate debugging modes.
  DEBUG_LOCATION:
    default: ''
    description: 'Evaluated dynamically in scripts: if ( $?DEBUG_LOCATION ) then'
  EMF_CLIENT:
    default: ''
    description: Path to the EMF client executable used for sending job status signals
      to the EMF server.
  EMF_JOBKEY:
    default: ''
    description: The unique EMF job identifier key used to communicate statuses with
      the EMF client server.
  EMF_PERIOD:
    default: ''
    description: The temporal period/date currently being processed. Used for EMF
      logging.
  ESDATE:
    default: ''
    description: The YYYYMMDD date manually advanced for iterative processing logic
      in the scripts.
  GRID:
    default: ''
    description: The target grid abbreviation used primarily for output file naming
      conventions (e.g., 36US1, 12US2).
  LOGS:
    default: ''
    description: Directory path pointing to the execution log outputs.
  OUTLOG:
    default: ''
    description: Used to define or pass values to $LOGS. Create directory for output
      program logs
  P:
    default: ''
    description: 'Evaluated dynamically in scripts: # $Path$'
  QA_LABEL:
    default: ''
    description: Label applied to report outputs for tracking QA scenarios.
  QA_SRC:
    default: ''
    description: 'Evaluated dynamically in scripts: echo '' ''$QA_SRC'
  QA_TYPE:
    default: ''
    description: Identifier used to name report inputs and outputs during QA routines
      (e.g., 'temporal', 'part4', 'inv').
  REPCONFIG:
    default: ''
    description: Used to define or pass values to $REPCONFIG_INV2_A, $REPCONFIG_INV2_B,
      $REPCONFIG_INV3_B, $REPCONFIG_TEMP, $REPCONFIG_AERMOD, $REPCONFIG_INV2, $REPCONFIG_INV,
      $REPCONFIG_INV2_C, $REPCONFIG_GRID, $REPCONFIG_INV3_A, $REPCONFIG_INV3, $REPCONFIG_INV3_...
  REPCONFIG_AERMOD:
    default: ''
    description: Specifies the Smkreport configuration file tailored for AERMOD-compatible
      emissions reporting and coordinate-based QA.
  REPCONFIG_GRID:
    default: ''
    description: Path to the Smkreport configuration file optimized for gridded inventory
      QA checkouts and spatial allocation validation.
  REPCONFIG_INV:
    default: ''
    description: Primary Smkreport configuration file (REPCONFIG) used for base inventory
      QA processing, defining core pollutants and summary reports.
  REPCONFIG_INV2:
    default: ''
    description: Specifies the filepath for a secondary Smkreport configuration (REPCONFIG)
      file, active only when QA_TYPE is set to 'inv2'. This provides an alternative
      reporting suite for inventory validation, allowing for distinct QA protocols
      without overwriting the base REPCONFIG_INV configuration.
  REPCONFIG_INV2_A:
    default: ''
    description: Specifies the filepath for variant A of the secondary inventory configuration,
      used when QA_TYPE is set to 'inv2a'.
  REPCONFIG_INV2_B:
    default: ''
    description: Specifies the filepath for variant B of the secondary inventory configuration,
      used when QA_TYPE is set to 'inv2b'.
  REPCONFIG_INV2_C:
    default: ''
    description: Specifies the filepath for variant C of the secondary inventory configuration,
      used when QA_TYPE is set to 'inv2c'.
  REPCONFIG_INV3:
    default: ''
    description: Specifies the filepath for a tertiary Smkreport configuration (REPCONFIG)
      file, active only when QA_TYPE is set to 'inv3'. This supports specialized multi-tier
      QA processing by enabling a third independent configuration for comprehensive
      inventory auditing.
  REPCONFIG_INV3_A:
    default: ''
    description: Specifies the filepath for variant A of the tertiary inventory configuration,
      used when QA_TYPE is set to 'inv3a'.
  REPCONFIG_INV3_B:
    default: ''
    description: Specifies the filepath for variant B of the tertiary inventory configuration,
      used when QA_TYPE is set to 'inv3b'.
  REPCONFIG_INV3_C:
    default: ''
    description: Specifies the filepath for variant C of the tertiary inventory configuration,
      used when QA_TYPE is set to 'inv3c'.
  REPCONFIG_TEMP:
    default: ''
    description: Specifies the filepath for the Smkreport configuration (REPCONFIG)
      file dedicated to temporal QA analysis, active when QA_TYPE is set to 'temporal'.
      This configuration is optimized for verifying temporal allocations, hourly emissions
      profiles, and daily summary statistics.
  REPORT1:
    default: ''
    description: File path for an external Smkreport output file (REPORT1). Used to
      register specific state/county/cell QA reports back into the EMF.
