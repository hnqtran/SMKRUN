  REPORT_BY_STATE:
    default: ''
    description: 'Y: Create report of emissions of model species to report file'
normbeis3:
  B360FAC:
    default: ''
    description: "(File) The B360FAC file for BEIS version 3.61 contains LAI, dry leaf biomass, winter biomass factor, indicator of specific leaf weight, and normalized emission fluxes for 34 different species/compounds listed in Table 6.57, \u201CFormat for B360FAC , BEIS version 3.61\u201D ."
  B3FAC:
    default: ''
    description: "(File) The B3FAC file for BEIS version 3.14 contains LAI, dry leaf biomass, winter biomass factor, indicator of specific leaf weight, and normalized emission fluxes for 34 different species/compounds listed in Table 6.58, \u201CFormat for B3FAC , BEIS version 3.14\u201D ."
  B3GRD:
    default: ''
    description: '(File) Gridded, normalized biogenic emissions (in grams of carbon or nitrogen per hour, depending on the species) and LAI: contains both summer and winter normalized emissions'
  BEISFAC:
    default: ''
    description: "(File) The BEISFAC file for BEIS version 3.7 or later version contains LAI, dry leaf biomass, winter biomass factor, indicator of specific leaf weight, and normalized emission fluxes for various species/compounds listed in Table 6.56, \u201CFormat for BEISFAC , BEIS version 3.7 or later version.\u201D . As of BEIS version 3.7, BEISFAC is deisgned for Section 6.9.1.7, \u201C BELD5 : Landuse input file for BEIS v3.7 or later version\u201D . NOTE: To check its comparability in Normbeis3 between BEISFAC and BELD5 , new header #BEISFAC4BELD5 is required. Similarly, in Normbeis4 , a #BELD6 is required in the first line of the BEISFAC file."
  BEIS_VERSION:
    default: '3.7'
    description: Define the version of BEIS model to perform
  BELD3_A:
    default: ''
    description: '(File) BELD3_A , BELD3_B , and BELD3_TOT files are I/O API netCDF files that contain gridded BELD3 data. The BELD3 data comprise 230 land use types. Because the I/O API limit on the number of variables in one netCDF file is 120, the gridded BELD3 data is broken up into two files ( BELD_A and BELD_B ). The BELD_TOT file contains additional information on the BELD3 data for the same grid as the BELD3_A and BELD3_B files. The BELD3_TOT file contains the following variable and description: FOREST: Percentage of forest area in each grid cell'
  BELD3_B:
    default: ''
    description: (File) Gridded land use (last 110 land use types) for BEIS v3.14
  BELD3_TOT:
    default: ''
    description: (File) Land use totals data for BEIS v3.14
  BELD4:
    default: ''
    description: "(File) Table 6.60, \u201CLand use categories in BELD4\u201D contains names and descriptions of the 286 land use categories in BELD4."
  BELD5:
    default: ''
    description: "(File) BELD5 share the same format as Table 6.60, \u201CLand use categories in BELD4\u201D that contains names and descriptions of the land use categories in BELD4."
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Normbeis3
normbeis4:
  BEISFAC:
    default: ''
    description: "(File) The BEISFAC file for BEIS version 3.7 or later version contains LAI, dry leaf biomass, winter biomass factor, indicator of specific leaf weight, and normalized emission fluxes for various species/compounds listed in Table 6.56, \u201CFormat for BEISFAC , BEIS version 3.7 or later version.\u201D . As of BEIS version 3.7, BEISFAC is deisgned for Section 6.9.1.7, \u201C BELD5 : Landuse input file for BEIS v3.7 or later version\u201D . NOTE: To check its comparability in Normbeis3 between BEISFAC and BELD5 , new header #BEISFAC4BELD5 is required. Similarly, in Normbeis4 , a #BELD6 is required in the first line of the BEISFAC file."
  BEIS_NORM_EMIS:
    default: ''
    description: '(File) Gridded, normalized biogenic emissions (in grams of carbon or nitrogen per hour, depending on the species): contains both summer and winter normalized emissions'
  BEIS_VERSION:
    default: '4.0'
    description: Define the version of BEIS model to perform
  BELD6:
    default: ''
    description: "(File) Table 6.59, \u201CLand use categories in BELD6\u201D lists the names and descriptions of the variables used in the BELD6 input file. Variable units are percent."
  BIOMASS:
    default: ''
    description: "(File) BIOMASS share the same format as Table 6.59, \u201CLand use categories in BELD6\u201D that contains names and descriptions of the land use categories in BELD6. Variable units are in grams per meter squared."
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Normbeis4
programs: {}
smkinven:
  ADAY | PDAY:
    default: ''
    description: (File) Day-specific inventory emissions assigned to sources in annual/average-day files (optional)
  AG:
    default: ''
    description: (File) Gridded annual or average-day data; this file can be created by Smkmerge and must be time-independent
  AHOUR | PHOUR:
    default: ''
    description: (File) Hour-specific inventory emissions assigned to sources in annual/average day files (optional)
  ALLOW_NEGATIVE:
    default: N
    description: 'Indicates if Smkinven should permit negative emissions values to be input from inventory files and output to SMOKE intermediate files. Y: Accept negative emissions values and will allow compute variables (from the SMKINVEN_FORMULA variable) to be negative. Smkinven gives warnings for each negative value in the inventory input and each computed value, until triggering the SMK_MAXWARNING setting''s values. N: Do not permit negative emissions values. Accept negative emissions values in the input inventory files, and will give errors for these. Smkinven will reset all negative computed values (from the SMKINVEN_FORMULA variable) to zero. Smkinven gives warnings for each negative computed value and indicates that the value was reset to zero.'
  AREA:
    default: ''
    description: (File) Annual and average-day inventory emissions and source characteristics
  ARINV:
    default: ''
    description: (File) 6.2.4.1. FF10 Format 6.2.4.2. ORL Formats The ARINV file is the input area source inventory file for annual or average-day data. This file can be in FF10 or ORL Formats.
  ARTOPNT:
    default: ''
    description: 'Y: Assign X and Y coordinates to specified sources based on the cross-reference file'
  ASCC:
    default: ''
    description: '(File) Type: ASCII - list-directed Summary: This file simply lists the SCC codes in the raw inventory.'
  CEMSUM:
    default: ''
    description: (File) CEM summary data produced by CEMScan
  CHECK_STACKS_YN:
    default: Y
    description: 'Indicates if stack parameter values should be checked for missing or out-of-range values; only checked if SMK_SOURCE is set to P. Y: Check input stack parameters for missing or out-of-range values N: Do not check input stack parameter values'
  COSTCY:
    default: ''
    description: "(File) The COSTCY file is used to assign numeric codes to the various countries, states, and counties to be modeled; the file also provides information concerning default time zones and Daylight Savings observance. A header line can be used in this file to indicate that population data are contained in the file as the last column on each line of the /COUNTY/ packet. The header line and additional population column are optional. If it is present in the file, it must be on the first line of the file and use the following syntax: #POPULATION <year> where <year> is a 4-digit year. The country, state, and county codes in each section of this file must be sorted in increasing order. If they are not, the programs reading this file will give an error. The format of the COSTCY file is shown in Table 6.85, \u201CFormat for COSTCY \u201D ."
  DAY_SPECIFIC_YN:
    default: N
    description: 'Defines whether to import day-specific inventory data. Y: Import day-specific data N: Do not import day-specific data'
  EXCLUDE_REF_SCC_YN:
    default: N
    description: "Defines whether to exclude a list of SCCs that are not listed in Section 6.10.11, \u201C SCCXREF : Reference SCC input file\u201D . This option is only applicable when USE_REF_SCC_YN is set to Y. Y: Import day-specific data N: Do not import day-specific data"
  FF10_AVEDAY_ANNINV_YN:
    default: N
    description: 'Uses area daily or hourly FF10-formatted invenotry as annual data. This will allow users to process ARDAY or ARHOUR invenotry data independently without artifical annual inventory data. Y: Use daily or hourly FF10-formatted inventory as annual data. N: Do not use daily or hourly FF10-formatted inventory as annual data. Just it as daily or hourly FF10-formatted inventory data.'
  FILL_ANNUAL:
    default: N
    description: "Allows annual data to be filled in with average-day data. Y: Use \u201C Y \u201D when annual emission numbers are blank for some records of the inventory but not all records. The emissions values will be filled in using the average-day emissions field, by multiplying the average-day number by the number of days in the inventory year (365 or 366). This option is useful when some sources have only annual data and some sources have only average-day data. Although the annual number will be filled in using the average-day one, the average-day emissions will be output from SMOKE as a whole. N: Do not fill in annual data based on average-day emissions values."
  FLOW_RATE_FACTOR:
    default: 0.0 ft 3 /MMBTU
    description: "Used to calculate hourly flow rates from hourly heat input when reading CEM data. If FLOW_RATE_FACTOR is set to zero or unset, then Smkinven will not calculate hourly flow rates. Detail information is described in Section 2.8.19, \u201CProcessing hour-specific CEM data\u201D hourly flow rate (m 3 /s) = [ FLOW_RATE_FACTOR (ft 3 /MMBTU) * hourly heat input (MMBTU/hr) * 0.02831 m 3 /ft 3 ] / 3600 s/hr"
  FULLSCC_ONLY:
    default: N
    description: Disables any sub-SCC cross-reference assignments that would otherwise be included in the cross-reference hierarchy. For example, the left-7, left-4, and left-2 levels of nonpoint and mobile SCCs would never be used. This is useful when zeros are a natural part of the SCC that the user does not want to assume are present for cross-reference hierarchy purposes. This option affects all Cntlmat input packets that use SCC assignments as part of their hierarchy. In this context, this option affects cross-referencing for the ARTOPNT , and NHAPEXCLUDE files by preventing left-7 SCC assignments. It also prevents left-2 and left-4 SCC assignments for NHAPEXCLUDE.
  GEOCODE_LEVEL1:
    default: ''
    description: "(File) The GEOCODE_LEVEL1 input file contains a 3 character code used to specify the Country-level Geographical Code. The COSTCY file will not be used if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each country in the gridded inventory data then they would create a GEOCODE_LEVEL1 file. The GEOCODE_LEVEL1 file is comma delimited as shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL1 file is shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D ."
  GEOCODE_LEVEL2:
    default: ''
    description: "(File) The GEOCODE_LEVEL2 input file contains up to 6 character code to specify the Country/State-level Geographical Codes which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each state level region for each country in the gridded inventory data then they would create a GEOCODE_LEVEL2 file. The GEOCODE_LEVEL2 file is comma delimited as shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL2 file is shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D ."
  GEOCODE_LEVEL3:
    default: ''
    description: "(File) The GEOCODE_LEVEL3 input file contains up to 9 character code to specify the Country/State-level/County-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL3 file is comma delimited as shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL3 file is shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D ."
  GEOCODE_LEVEL4:
    default: ''
    description: "(File) The GEOCODE_LEVEL4 input file contains a 12 character code to specify the Country/State/County/Tribal-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL4 file is comma delimited as shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL4 file is shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D ."
  GRIDMASK:
    default: ''
    description: (File) Defines an integer geocode to specify the predominant country and state code covered by each grid cell ( GEOCODE_LEVEL ) and an integer TZONES to specify the predominant Time Zone for each grid cell.
  HOURLY_TO_DAILY:
    default: N
    description: 'Defines whether to treat the hour-specific inputs as day-specific data. Y: Use daily-total column only from hour-specific input file, and process as day-specific data. This setting does not work for input of hour-specific data using CEM format. N: Treat hourly file as hourly data'
  HOURLY_TO_PROFILE:
    default: N
    description: 'Defines whether to treat the hour-specific inputs as hour-specific temporal profiles. Y: Treat hourly data as temporal profile, and divide each hourly value by value in the daily total column of the file. The values are not renormalized. The resulting hour-specific output file will be recognized by the Temporal program as containing hourly profiles. This setting does not work for input of hour-specific data using CEM format. N: Treat hourly file as hourly data'
  HOUR_SPECIFIC_YN:
    default: N
    description: 'Defines whether to import hour-specific inventory data. Y: Import hour-specific data N: Do not import hour-specific data'
  IMPORT_AVEINV_YN:
    default: Y
    description: 'Defines whether to import the annual and average-day inventory data. This is set to N to import day-specific or hour-specific data after Smkinven has previously been run for the annual and average-day data. Y: Import annual and average-day inventory data from PTINV file N: Use SMOKE inventory files from a previous run of Smkinven to get the SMOKE source characteristics to match with the day-specific and hour-specific sources'
  IMPORT_GRDIOAPI_YN:
    default: N
    description: 'Defines whether the program will import a gridded I/O API NetCDF inventory file. This setting can be used only with area-source processing, and it overrides all other program settings for importing data (e.g., day- and hour-specific data import will be shut off). Y: Import gridded I/O API data N: Do not import gridded I/O API data'
  INVNAME1:
    default: none
    description: Sets root for naming output map inventory file
  INVNAME2:
    default: none
    description: Sets root for naming output ASCII inventory file
  INVTABLE:
    default: ''
    description: "(File) The INVTABLE file replaces the SIPOLS and ACTVNAMS files previously used by SMOKE. Smkinven uses the inventory table to select the inventory pollutants that will be output by Smkinven . The valid pollutants are again checked at the end of SMOKE processing by Smkmerge , to ensure that the program knows about all of the pollutants and also to set the order of the output variables (output species are sorted by the order of the pollutants in the inventory table and for multiple species per pollutant, by alphabetical order). You can use the INVTABLE to drop inventory pollutants in Smkinven without having to modify the inventory files, simply by modifying INVTABLE . The units used in the SMOKE intermediate files are listed in this file. The SMOKE programs Spcmat , and Movesmrg use this file to determine which pollutants should be included in the NONHAPVOC or NONHAPTOG calculation. The inventory table also provides a way to assign the SPECIATE4 species ID to any pollutant\
      \ that is a Hazardous Air Pollutant (HAP) VOC. This assignment is not used directly by SMOKE, but rather is used by the Speciation Tool when creating VOC speciation profiles. This is used only when creating speciation profiles to support SMOKE runs that will combine criteria VOC and HAP VOC emissions, using the NHAPEXCLUDE file in the Smkinven program. More specifically, this can be done for the purpose of using VOC HAP emissions to augment VOC speciation profiles. Since the Inventory Table provides information to the Speciation Tool, this field is not used by SMOKE, but is included for continued integration of SMOKE inputs with the Speciation Tool. As described in the Smkinven documentation in Chapter 6, Smkinven in some cases will create \"no-integrate\" (NOI) HAP pollutant emissions from the inventory data by renaming the pollutant with a \"_NOI\" suffix applied to the end of the Inventory Data Name from the Inventory Table for such pollutants. Similarly, Smkinven will automatically\
      \ add all possibly needed \"_NOI\" pollutant names to the internal master list of valid pollutant names. This list would otherwise be limited to the contents of the INVTABLE file entries where the Keep column contains an \"Y\". Smkinven inserts these names in the master list such that the \"_NOI\" version of the pollutant name appears in the list just after the polutant on which the name is based. The inserted entries that include \"_NOI\" are made when the following values are included for the pollutant in the INVTABLE file. A \"Y\" appears in the \"Keep\" field A \"V\" or \"T\" appears in the \"VOC or TOG component\" field A \"Y\" appears in the \"Model species\" field Something other than \"Y\" appears in the \"Explicit in mechanism\" field (e.g., \"N\" or blank) It is possible for a user to choose two pollutants that result in double counting the emissions from the inventory. For example, you may want to model both benzo(a)pyrene and 7-PAH which, would result in the emissions associated\
      \ with CAS number 205992 (for benzo(a)pyrene) to be duplicated. The user is responsible for the choices made and the resulting changes in inventory mass. The format of the INVTABLE is shown in Table 6.91, \u201CFormat for INVTABLE \u201D ."
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Smkinven
  MAX_STK_DIAMETER:
    default: '100.0'
    description: Define maximum stack diameter in unit of meter
  MAX_STK_HEIGHT:
    default: '5100.0'
    description: Define maximum stack height in unit of meter
  MAX_STK_TEMPERATURE:
    default: '2000.0'
    description: Define maximum stack exit temperature in unit of Kelvin
  MAX_STK_VELOCITY:
    default: '500.0'
    description: Define maximum stack exit velocity in unit of m/sec
  MBINV:
    default: ''
    description: '(File) 6.2.5.1. ORL Format 6.2.5.2. FF10 Activity Inventory Format The MBINV file is the input mobile-source inventory data file. Two formats are available: one for activity data in FF10 format and one for emissions data in ORL format.'
  MIN_STK_DIAMETER:
    default: '0.01'
    description: Define minimum stack diameter in unit of meter
  MIN_STK_HEIGHT:
    default: '0.5'
    description: Define minimum stack height in unit of meter
  MIN_STK_TEMPERATURE:
    default: '260.0'
    description: Define minimum stack exit temperature in unit of Kelvin
  MIN_STK_VELOCITY:
    default: '0.0001'
    description: Define minimum stack exit velocity in unit of m/sec
  MOBL:
    default: ''
    description: (File) Annual and average-day inventory emissions and source characteristics
  MSCC:
    default: ''
    description: (File) List of SCCs appearing in the raw inventory file
  NHAPEXCLUDE:
    default: ''
    description: 'ALL: Treat all sources as integrated if a toxics inventory has been provided. Does not require an file'
  NONHAP_TYPE:
    default: VOC
    description: "Define the name of organic compound inventory pollutant VOC or TOG for a proper integration between VOC or TOG, and hazardous air pollutants (HAPs) to compute NONHAPVOC or NONHAPTOG. See Section 2.8.5, \u201CCombine toxics and criteria inventories\u201D for a more detail description of criteria/HAP VOC integration. This option will be used only when SMK_PROCESS_HAPS is set."
  NO_STACK_REPLACE_FUGITIVE:
    default: N
    description: 'Defines whether the program skips correcting any missing and/or out-of-range stack parameters. Y: Skip correcting any missing and/or out-of-range stack parameters N: Do not skip correcting any missing and/or out-of-range stack parameters'
  ORISDESC:
    default: ''
    description: "(File) The ORISDESC file provides descriptive information for the ORIS IDs, which Smkinven uses when reporting the status of reading and matching CEM data. The information in this file will appear in the REPINVEN output file from Smkinven . The format of the ORISDESC file is shown in Table 6.95, \u201CFormat for ORISDESC \u201D . Note that only the first five columns of data need to appear in the file; the rest can be blank because SMOKE does not use any information past column E."
  OUTPUT_LOCAL_TIME:
    default: N
    description: 'Defines whether the program processes daily/hourly inventories in local time or not. Y: Process daily/hourly inventories in local time. No time zone shift. N: Apply time zone shift.'
  PNTS:
    default: ''
    description: (File) Annual and average-day inventory emissions and source characteristics
  PROCESS_MULT_ORIS_UNITS_YN:
    default: N
    description: 'Defines whether the program considers ORIS and Boiler IDs as additional source characteristics along with native point inventory source characteristics (i.e., facility, unit, release point, and process IDs). Y: Consider ORIS/Boiler IDs along with native point characteristics. NOTE that this option will internally modify the unit IDs by appending ''_##'' when there are multiple ORIS/Boiler IDs Continuous Emissions Monitoring (CEM) sources under same unit IDs. N: Do not consider ORIS/Boiler IDs as point characteristics.'
  PSCC:
    default: ''
    description: (File) List of SCCs appearing in the raw inventory file
  PSTK:
    default: ''
    description: "(File) The PSTK file is an ASCII file that contains the replacement stack parameters that Smkinven uses when stack parameters are missing from the inventory. The format of the file permits stack parameters to be replaced based on the point sources\u2019 country/state/county code and SCC and is shown in Table 6.82, \u201CFormat for PSTK \u201D ."
  PTDAY:
    default: ''
    description: "(File) 6.2.6.1. FF10 Format 6.2.6.2. ORL FIREEMIS Emission Format The PTDAY file is the input point-source inventory file for day-specific data. The file must be a list file (see Section 6.2.1.1, \u201CInventory list files\u201D ) and the files listed in the PTDAY file must be in the format shown in Table 6.20, \u201CFF10 Format for individual point day-specific data files\u201D and Table 6.21, \u201CFormat for individual day-specific data files for fires : ORL FIREEMIS\u201D . The contents of the day-specific data files vary depending on whether the PTINV file is in FF10 or ORL FIRE format. The day-specific files can have a #COUNTRY header entry to set the country code (see Section 6.2.1.4, \u201CHeader records\u201D ). If no #COUNTRY header is used, then SMOKE will use the default country code of 0 (which corresponds to the United States in the default COSTCY file)."
  PTHOUR:
    default: ''
    description: "(File) 6.2.7.1. Date range setting 6.2.7.2. CEM hour-specific format 6.2.7.3. FF10 hour-specific format 6.2.7.4. EMS-95 Format and EMS-95 Wider Format The PTHOUR file is the input point-source inventory file for hour-specific data and profiles. The file must be a list file (see Section 6.2.1.1, \u201CInventory list files\u201D and the files listed in the PTHOUR file must be in Continuous Emissions Monitoring (CEM) format when processing hourly CEM inventory data files with an format identifier (#CEM) or the format can be specified in the PTHOUR list file (#LIST CEM). In addition, these files can have a #COUNTRY entry to set the country code (see Section 6.2.1.4, \u201CHeader records\u201D . The default country code is 0, which corresponds to the United States in the default COSTCY file. 6.2.7.1. Date range setting The PTHOUR file may optionally contain a packet to control the range of dates for which Smkinven will read data. When this feature is needed, the following entry\
      \ should appear on the first line of the PTHOUR file. DATERANGE MMDD(start) MMDD(end) where MMDD is the two-digit month and day of the month at the start and end of the period of interest. For example, to request July 10th through 12th, the first line of the file should read: DATERANGE 0710 0712 The year is implied by the data themselves; note that the files can only contain data for a single year. As an alternative to using the DATERANGE packet, you can manually break the year up into smaller periods in separate files, and only list the files of interest in the PTHOUR file. Note that reading in the whole year of data and extracting just a few days will take much more time than manually editing the file to contain just the days of interest. Also note that if you choose the manual editing option, you must select days that fully cover the modeling episode after accounting for time zone differences between the facility\u2019s time zone and the modeling time zone (set by the OUTZONE option)."
  PTINV:
    default: ''
    description: 'Y: Import annual and average-day inventory data from file'
  RAW_DUP_CHECK:
    default: N
    description: 'Defines whether the program checks for duplicate records in the input file. Y: Check for duplicates, and produce a fatal error if found N: Do not check for duplicates, and add emissions from duplicate records'
  REPINVEN:
    default: ''
    description: "(File) Type: ASCII - list-directed Summary: This report is made up of several different sections describing different parts of the inventory import. This section lists, by CAS number, the emissions in tons/year; the number of inventory records; whether all, some, or none of the pollutants associated with that CAS number were kept; and the CAS number description. The columns in the report include: CAS number Whether all, some, or none of the pollutants were kept Number of inventory records read for the CAS number Emissions for the CAS number CAS number description This section includes emissions before and after application of disaggregation factors from the INVTABLE . Only the pollutants that have Keep = Y in INVTABLE will be included in this report. This report will be provided only if disaggregation and/or aggregation have occurred. The columns in the report include: \u201C Kept \u201D unique CAS number Emissions total for the CAS number Factor used to adjust the CAS\
      \ number to the pollutant Pollutant name Emissions total of the inventory pollutant Pollutant description CAS number description The following sections are only for area-to-point assignments: This section lists SCCs that have area-to-point source factor file assignments but are not in the inventory. The columns in the report include: Assigned SCC codes not in the inventory For emissions going to point sources, this section lists the pollutant name, emissions total before and after the factors are applied, and the total number of FIPS codes affected, by SCC. The columns in the report include: SCC code Pollutant name Number of FIPS codes affected Emissions before factors are applied Emissions after factors are applied SCC description Same as the above section, except emissions are reported by state. The columns in the report include: State SCC code Pollutant name Number of FIPS codes affected Emissions before factors are applied Emissions after factors are applied SCC description This\
      \ section lists, by SCC, the number of state and county FIPS codes getting assigned to point locations and the number not getting assigned. The columns in the report include: SCC code Number of FIPS assigned to point locations Number of FIPS not assigned to point locations SCC description"
  SCCDESC:
    default: ''
    description: "(File) This file provides textual descriptions of the SCCs, which are used by two programs: Smkinven when reading hourly emissions data (for reporting in the REPINVEN output file) Smkreport when the user requests the SCC description be included in the report. There are delimited and fixed formats available for the SCCDESC file shown in Table 6.97, \u201CDelimited format for SCCDESC \u201D and Table 6.98, \u201CFixed format for SCCDESC \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the SCCDESC file is shown in Table 6.97, \u201CDelimited format for SCCDESC \u201D ."
  SCCXREF:
    default: ''
    description: '(File) This file provides mapping between reference SCC (i.e., SCC8) and full SCC (i.e., SCC10) for Smkinven to convert reference SCC-level inventory to full SCC inventory:'
  SMKINVEN_FORMULA:
    default: ''
    description: 'Y: Accept negative emissions values and will allow compute variables (from the variable) to be negative. Smkinven gives warnings for each negative value in the inventory input and each computed value, until triggering the SMK_MAXWARNING setting''s values.'
  SMKINVEN_MONTH:
    default: '0'
    description: "Defines the number of month to process. The integer month number will allow users to pick monthly total inventory data in area FF10-formatted invenotry data listed at Table 6.15, \u201CFF10 Format for ARINV \u201D ."
  SMK_ARTOPNT_YN:
    default: N
    description: 'Y: Assign X and Y coordinates to specified sources based on the ARTOPNT cross-reference file N: Do not perform area-to-point processing'
  SMK_BASEYR_OVERRIDE:
    default: '0'
    description: Used to override the base year determined by the inventory.
  SMK_DEFAULT_TZONE:
    default: '5'
    description: Defines the default time zone to use for sources that do not match entries in the COSTCY or the GEOCODE_LEVEL4 file.
  SMK_MAXERROR:
    default: '100'
    description: Defines the maximum number of ERROR statements to be displayed by SMOKE.
  SMK_MAXWARNING:
    default: '100'
    description: Defines the maximum number of WARNING statements to be displayed by SMOKE.
  SMK_PROCESS_HAPS:
    default: blank
    description: "Defines how to treat sources for combining criteria VOC and hazardous air pollutants (HAP) together. See Section 2.8.5, \u201CCombine toxics and criteria inventories\u201D for more detail. ALL: Treat all sources as integrated if a toxics inventory has been provided. Does not require an NHAPEXCLUDE file NONE: Treat all sources as non-integrate if a toxics inventory has been provided. Does not require an NHAPEXCLUDE file PARTIAL: Read the NHAPEXCLUDE cross-reference file and either include or exclude the specified sources from the NONHAP[VOC|TOG] calculation depending on the header of the NHAPEXCLUDE file. See Section 6.10.7, \u201C NHAPEXCLUDE : NonHAP VOC calculation inclusions/exclusions file\u201D ."
  SMK_SOURCE:
    default: blank
    description: 'Defines the type of sources to be processed. Valid values are A: Area processing B: Biogenic processing M: Mobile processing P: Point processing.'
  SMK_TMPDIR:
    default: .
    description: Sets the path for writing temporary files needed when importing the inventory.
  USE_EXP_GEO_CODES:
    default: N
    description: If set to Y then use GEOCODE_LEVEL[1-4] files instead of the COSTCY file to define expanded geographical detail such as country-level(GEOCODE_LEVEL1), country/state-level (GEOCODE_LEVEL2), country/state/county-level (GEOCODE_LEVEL3) or country/state/county/tribal-level (GEOCODE_LEVEL4).
  USE_REF_SCC_YN:
    default: N
    description: "Defines whether use reference SCC (i.e., SCC8) to full SCC (i.e., SCC10) mapping input file to convert reference SCC-level inventory to full SCC inventory. See detail from Section 6.10.11, \u201C SCCXREF : Reference SCC input file\u201D Y: Use reference SCC mapping input file to convert reference SCCs to full SCCs. N: Do not use SCCXREF input file."
  VELOC_RECALC:
    default: N
    description: 'Defines whether stack velocity is recalculated in order to make the velocity consistent with the reported flow and diameter. Y: Recalculate stack velocity N: Output the input stack velocity'
  WEST_HSPHERE:
    default: Y
    description: 'Defines how spatial coordinates are interpreted. Y: Convert longitudinal coordinates for the Western Hemisphere (positive values are converted to negative values) N: Do not convert longitude values (positive values are not changed)'
  WKDAY_NORMALIZE:
    default: N
    description: "Clarifies the nature of the \u201C average-day \u201D data read in by Smkinven and will impact the Temporal program processing of average-day data for all formats. Y: Average-day emissions input to Smkinven are based on weekday emissions only. In Temporal , these emissions will be adjusted with weekly profiles normalized with weekdays only (Monday through Friday) N: Average-day emissions input to Smkinven are based on all days of the week . In Temporal , these emissions will be adjusted with weekly profiles normalized with all days of the week."
  WRITE_ANN_ZERO:
    default: N
    description: 'Indicates if annual emission values equal to zero should be written to the intermediate inventory file Y: Write zero emission values; this option makes the intermediate inventory file larger but is sometimes necessary when only daily or hourly data is provided and the entries in the annual inventory are dummy values N: Do not write zero values'
smkmerge:
  ACMAT:
    default: ''
    description: (File) Multiplicative control matrix, output by Cntlmat (used when MRG_CTLMAT_MULT is set)
  AGMAT:
    default: ''
    description: (File) Gridding matrix from Grdmat
  AG[T][S][C][3D][_S|_L][_O]:
    default: ''
    description: '(File) Merged emission file, produced when MRG_GRDOUT_YN is set to Y; actual file name is determined by the environment variables used to configure Smkmerge , as follows: [area|biogenic|mobile|point|every] ( MRG_SOURCE ) T = temporally allocated ( MRG_TEMPORAL_YN ) S = speciated ( MRG_SPCMAT_YN ) C = controlled ( MRG_CTLMAT_MULT or MRG_CTLMAT_REAC ) 3D = layered ( MRG_LAYERS_YN ) _S = mass-based speciation ( SPC_INPUT ) _L = mole-based speciation ( SPC_INPUT ) _O = used when only merging biogenic sources ( MRG_SOURCE = B)'
  AOUT:
    default: ''
    description: Processing source output file
  AREA:
    default: ''
    description: (File) Intermediate area-, mobile-, or point-source inventory created by Smkinven
  AREA_SURROGATE_NUM:
    default: '60'
    description: Surrogate code of the area surrogate in the BGPRO file, to use for totals of biogenic emissions by state and county.
  ARMAT:
    default: ''
    description: (File) Mass- or mole-based reactivity matrix, output by Cntlmat (used when MRG_CTLMAT_REAC is set)
  ASMAT:
    default: ''
    description: (File) Mass- or mole-based speciation matrix from Spcmat (used when MRG_SPCMAT_YN = Y)
  ATMP:
    default: ''
    description: (File) Hourly emissions from Temporal (used when MRG_TEMPORAL_YN = Y and MRG_BYDAY is not set)
  ATMP_{DAY}:
    default: ''
    description: (File) Hourly emissions from Temporal by day, where {day} = MON, TUE, WED, THU, FRI, SAT, SUN (used when MRG_TEMPORAL_YN = Y and MRG_BYDAY is set)
  BGPRO:
    default: ''
    description: "(File) The BGPRO file must be provided to SMOKE when using county land use data, in order to provide a means of converting county land use to gridded land use. The format for the BGPRO file is the same as for the Area and Mobile spatial surrogate files (see Section 6.4.2, \u201CArea and Mobile Spatial Surrogates Files\u201D )."
  BGTS:
    default: ''
    description: (File) Biogenic model-ready emissions, to be input only when merging with other source categories, or when computing biogenic state and county totals, produced by Tmpbeis3 or Tmpbeis4
  BG[T][S][C][3D][_S|_L][_O]:
    default: ''
    description: '(File) Merged emission file, produced when MRG_GRDOUT_YN is set to Y; actual file name is determined by the environment variables used to configure Smkmerge , as follows: [area|biogenic|mobile|point|every] ( MRG_SOURCE ) T = temporally allocated ( MRG_TEMPORAL_YN ) S = speciated ( MRG_SPCMAT_YN ) C = controlled ( MRG_CTLMAT_MULT or MRG_CTLMAT_REAC ) 3D = layered ( MRG_LAYERS_YN ) _S = mass-based speciation ( SPC_INPUT ) _L = mole-based speciation ( SPC_INPUT ) _O = used when only merging biogenic sources ( MRG_SOURCE = B)'
  COSTCY:
    default: ''
    description: "(File) The COSTCY file is used to assign numeric codes to the various countries, states, and counties to be modeled; the file also provides information concerning default time zones and Daylight Savings observance. A header line can be used in this file to indicate that population data are contained in the file as the last column on each line of the /COUNTY/ packet. The header line and additional population column are optional. If it is present in the file, it must be on the first line of the file and use the following syntax: #POPULATION <year> where <year> is a 4-digit year. The country, state, and county codes in each section of this file must be sorted in increasing order. If they are not, the programs reading this file will give an error. The format of the COSTCY file is shown in Table 6.85, \u201CFormat for COSTCY \u201D ."
  EG[T][S][C][3D][_S|_L][_O]:
    default: ''
    description: '(File) Merged emission file, produced when MRG_GRDOUT_YN is set to Y; actual file name is determined by the environment variables used to configure Smkmerge , as follows: [area|biogenic|mobile|point|every] ( MRG_SOURCE ) T = temporally allocated ( MRG_TEMPORAL_YN ) S = speciated ( MRG_SPCMAT_YN ) C = controlled ( MRG_CTLMAT_MULT or MRG_CTLMAT_REAC ) 3D = layered ( MRG_LAYERS_YN ) _S = mass-based speciation ( SPC_INPUT ) _L = mole-based speciation ( SPC_INPUT ) _O = used when only merging biogenic sources ( MRG_SOURCE = B)'
  ELEV:
    default: ''
    description: Elevated-point-sources file, produced if SMK_ASCIIELEV_YN is set to Y; if PinG sources have also been selected, then the stack diameters listed in this file will be set to the negative value of their actual value.
  ELEV[T]S[C][_S|_L]:
    default: ''
    description: (File) Elevated-point-sources file, produced if SMK_ASCIIELEV_YN is set to Y; if PinG sources have also been selected, then the stack diameters listed in this file will be set to the negative value of their actual value
  EOUT:
    default: ''
    description: Processing source output file
  EXPLICIT_PLUMES_YN:
    default: N
    description: 'Indicates whether only explicit plume rise sources should be merged. Y: Merge only explicit plume rise sources; uses PLAY_EX file N: Merge all plume rise sources; uses PLAY file'
  GEOCODE_LEVEL1:
    default: ''
    description: "(File) The GEOCODE_LEVEL1 input file contains a 3 character code used to specify the Country-level Geographical Code. The COSTCY file will not be used if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each country in the gridded inventory data then they would create a GEOCODE_LEVEL1 file. The GEOCODE_LEVEL1 file is comma delimited as shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL1 file is shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D ."
  GEOCODE_LEVEL2:
    default: ''
    description: "(File) The GEOCODE_LEVEL2 input file contains up to 6 character code to specify the Country/State-level Geographical Codes which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each state level region for each country in the gridded inventory data then they would create a GEOCODE_LEVEL2 file. The GEOCODE_LEVEL2 file is comma delimited as shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL2 file is shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D ."
  GEOCODE_LEVEL3:
    default: ''
    description: "(File) The GEOCODE_LEVEL3 input file contains up to 9 character code to specify the Country/State-level/County-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL3 file is comma delimited as shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL3 file is shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D ."
  GEOCODE_LEVEL4:
    default: ''
    description: "(File) The GEOCODE_LEVEL4 input file contains a 12 character code to specify the Country/State/County/Tribal-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL4 file is comma delimited as shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL4 file is shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D ."
  GRIDDESC:
    default: ''
    description: (File) The GRIDDESC file is used to provide grid and projection information to SMOKE and can contain data for many different projections and many different grids. The format of the GRIDDESC file is available in the I/O API documentation at http://www.baronams.com/products/ioapi/GRIDDESC.html .
  INLN:
    default: ''
    description: CMAQ 2-D surface layer emissions file, produced if SMK_ELEV_METHOD is set to 2. For in-line processing plume rise processing, MRG_LAYERS_YN must set to N to create hourly speciated 2-D surface layer emissions file for CMAQ version 4.7 or later.
  INLN[T][S]_S|_L]:
    default: ''
    description: (File) CMAQ in-line emissions file, produced if SMK_ELEV_METHOD is set to 2
  INVTABLE:
    default: ''
    description: "(File) The INVTABLE file replaces the SIPOLS and ACTVNAMS files previously used by SMOKE. Smkinven uses the inventory table to select the inventory pollutants that will be output by Smkinven . The valid pollutants are again checked at the end of SMOKE processing by Smkmerge , to ensure that the program knows about all of the pollutants and also to set the order of the output variables (output species are sorted by the order of the pollutants in the inventory table and for multiple species per pollutant, by alphabetical order). You can use the INVTABLE to drop inventory pollutants in Smkinven without having to modify the inventory files, simply by modifying INVTABLE . The units used in the SMOKE intermediate files are listed in this file. The SMOKE programs Spcmat , and Movesmrg use this file to determine which pollutants should be included in the NONHAPVOC or NONHAPTOG calculation. The inventory table also provides a way to assign the SPECIATE4 species ID to any pollutant\
      \ that is a Hazardous Air Pollutant (HAP) VOC. This assignment is not used directly by SMOKE, but rather is used by the Speciation Tool when creating VOC speciation profiles. This is used only when creating speciation profiles to support SMOKE runs that will combine criteria VOC and HAP VOC emissions, using the NHAPEXCLUDE file in the Smkinven program. More specifically, this can be done for the purpose of using VOC HAP emissions to augment VOC speciation profiles. Since the Inventory Table provides information to the Speciation Tool, this field is not used by SMOKE, but is included for continued integration of SMOKE inputs with the Speciation Tool. As described in the Smkinven documentation in Chapter 6, Smkinven in some cases will create \"no-integrate\" (NOI) HAP pollutant emissions from the inventory data by renaming the pollutant with a \"_NOI\" suffix applied to the end of the Inventory Data Name from the Inventory Table for such pollutants. Similarly, Smkinven will automatically\
      \ add all possibly needed \"_NOI\" pollutant names to the internal master list of valid pollutant names. This list would otherwise be limited to the contents of the INVTABLE file entries where the Keep column contains an \"Y\". Smkinven inserts these names in the master list such that the \"_NOI\" version of the pollutant name appears in the list just after the polutant on which the name is based. The inserted entries that include \"_NOI\" are made when the following values are included for the pollutant in the INVTABLE file. A \"Y\" appears in the \"Keep\" field A \"V\" or \"T\" appears in the \"VOC or TOG component\" field A \"Y\" appears in the \"Model species\" field Something other than \"Y\" appears in the \"Explicit in mechanism\" field (e.g., \"N\" or blank) It is possible for a user to choose two pollutants that result in double counting the emissions from the inventory. For example, you may want to model both benzo(a)pyrene and 7-PAH which, would result in the emissions associated\
      \ with CAS number 205992 (for benzo(a)pyrene) to be duplicated. The user is responsible for the choices made and the resulting changes in inventory mass. The format of the INVTABLE is shown in Table 6.91, \u201CFormat for INVTABLE \u201D ."
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Smkmerge
  MCMAT:
    default: ''
    description: (File) Multiplicative control matrix, output by Cntlmat (used when MRG_CTLMAT_MULT is set)
  MGMAT:
    default: ''
    description: (File) Gridding matrix from Grdmat
  MG[T][S][C][3D][_S|_L][_O]:
    default: ''
    description: '(File) Merged emission file, produced when MRG_GRDOUT_YN is set to Y; actual file name is determined by the environment variables used to configure Smkmerge , as follows: [area|biogenic|mobile|point|every] ( MRG_SOURCE ) T = temporally allocated ( MRG_TEMPORAL_YN ) S = speciated ( MRG_SPCMAT_YN ) C = controlled ( MRG_CTLMAT_MULT or MRG_CTLMAT_REAC ) 3D = layered ( MRG_LAYERS_YN ) _S = mass-based speciation ( SPC_INPUT ) _L = mole-based speciation ( SPC_INPUT ) _O = used when only merging biogenic sources ( MRG_SOURCE = B)'
  MOBL:
    default: ''
    description: (File) Intermediate area-, mobile-, or point-source inventory created by Smkinven
  MOUT:
    default: ''
    description: Processing source output file
  MRG_BYDAY:
    default: blank
    description: "String code that specifies which source categories (if any) are to use a by-day approach for the hourly input files (see \u201C Description \u201D section above for more information on this approach). Valid settings include A, M, P, or any combination. For example, set this environment variable to \u201C AMP \u201D to have Smkmerge read the area-, mobile-, and point-source hourly emissions files individually for each day."
  MRG_CTLMAT_MULT:
    default: blank
    description: "String code that specifies which source categories (if any) are to be processed using a multiplicative control matrix. Valid settings include A, M, P, or any combination. For example, set this environment variable to \u201C M \u201D to have Smkmerge read the mobile-source multiplicative control matrix."
  MRG_CTLMAT_REAC:
    default: blank
    description: "String code that specifies which source categories (if any) are to be processed using a reactivity control matrix. Valid settings include A, M, P, or any combination. For example, set this environment variable to \u201C MP \u201D to have Smkmerge read the mobile- and point-source reactivity control matrices."
  MRG_GRDOUT_UNIT:
    default: input file units
    description: "String code that permits the user to change the units of the gridded output file. For example, \u201C kg/hr \u201D would convert the output emissions to kilograms per hour, before outputting the emissions data file. Not all conversions are known to SMOKE. Valid numerators are: \u201C tons \u201D, \u201C kg \u201D, \u201C moles \u201D, and \u201C g \u201D; note that molar emissions cannot be output without the mole-based speciation matrices. Valid denominators are \u201C yr \u201D, \u201C dy \u201D, \u201C hr \u201D, and \u201C s \u201D. Note that if annual output is requested but not available in the input file, leap year adjustments are not made. Units required by CMAQ are moles/s and most other air quality models are moles/hr."
  MRG_GRDOUT_YN:
    default: N
    description: 'Defines whether the program produces a gridded output file. Y: Produce the file N: Do not produce the file'
  MRG_LAYERS_YN:
    default: N
    description: 'Defines whether the program uses the layer fractions file. Y: Use the layer fractions file N: Do not use the layer fractions file'
  MRG_MARKETPEN_YN:
    default: Y
    description: 'Defines whether the program uses market penetration from reactivity matrices. Y: Use market penetration N: Do not use market penetration'
  MRG_METCHK_YN:
    default: Y
    description: 'Defines whether the program checks consistency of headers in the meteorology file. Y: Check contents of meteorology file headers N: Do not check headers'
  MRG_REPCNY_YN:
    default: N
    description: 'Defines whether the program produces a report of emission totals by county. Y: Produce county-total emissions report N: Do not produce the report'
  MRG_REPCTL_YN:
    default: N
    description: 'Defines whether the program reports controlled emissions or not. Y: Report controlled emissions N: Do not report controlled emissions'
  MRG_REPSTA_YN:
    default: N
    description: 'Defines whether the program produces a report of emission totals by state. Y: Produce state-total emissions report N: Do not produce the report'
  MRG_SOURCE:
    default: blank (processing halts)
    description: 'Series of character codes representing the type(s) of sources to be merged. A: Area sources B: Biogenic sources M: Mobile sources P: Point sources AP: Area and point sources AM: Area and mobile sources etc.'
  MRG_SPCMAT_YN:
    default: N
    description: 'Defines whether the program produces speciated output. Y: Read the speciation matrix produced by the Spcmat program N: Do not read the speciation matrix'
  MRG_TEMPORAL_YN:
    default: N
    description: 'Defines whether the program produces temporally allocated output. Y: Read the temporal matrix produced by the Temporal program N: Do not read the temporal matrix'
  MRG_TOTOUT_UNIT:
    default: input file units, or per day if hourly input is used
    description: This variable is like the MRG_GRDOUT_UNIT variable, except that it controls the state and county totals reports separately from the gridded outputs. The only difference is the temporal resolution of MRG_TOTOUT_UNIT , which always outputs the emission values as daily totals, no matter what units are used.
  MRMAT:
    default: ''
    description: (File) Mass- or mole-based reactivity matrix, output by Cntlmat (used when MRG_CTLMAT_REAC is set)
  MSMAT:
    default: ''
    description: (File) Mass- or mole-based speciation matrix from Spcmat (used when MRG_SPCMAT_YN = Y)
  MTMP:
    default: ''
    description: (File) Hourly emissions from Temporal (used when MRG_TEMPORAL_YN = Y and MRG_BYDAY is not set)
  MTMP_{DAY}:
    default: ''
    description: (File) Hourly emissions from Temporal by day, where {day} = MON, TUE, WED, THU, FRI, SAT, SUN (used when MRG_TEMPORAL_YN = Y and MRG_BYDAY is set)
  PCMAT:
    default: ''
    description: (File) Multiplicative control matrix, output by Cntlmat (used when MRG_CTLMAT_MULT is set)
  PELV:
    default: ''
    description: (File) Elevated point sources identification file, output by Elevpoint
  PGMAT:
    default: ''
    description: (File) Gridding matrix from Grdmat
  PG[T][S][C][3D][_S|_L][_O]:
    default: ''
    description: '(File) Merged emission file, produced when MRG_GRDOUT_YN is set to Y; actual file name is determined by the environment variables used to configure Smkmerge , as follows: [area|biogenic|mobile|point|every] ( MRG_SOURCE ) T = temporally allocated ( MRG_TEMPORAL_YN ) S = speciated ( MRG_SPCMAT_YN ) C = controlled ( MRG_CTLMAT_MULT or MRG_CTLMAT_REAC ) 3D = layered ( MRG_LAYERS_YN ) _S = mass-based speciation ( SPC_INPUT ) _L = mole-based speciation ( SPC_INPUT ) _O = used when only merging biogenic sources ( MRG_SOURCE = B)'
  PING:
    default: ''
    description: CMAQ PinG file, produced if SMK_PING_METHOD is set to 1
  PING[T][S][C][_S|_L]:
    default: ''
    description: (File) CMAQ PinG file, produced if SMK_PING_METHOD is set to 1
  PLAY:
    default: ''
    description: 'N: Merge all plume rise sources; uses file'
  PLAY_EX:
    default: ''
    description: 'Y: Merge only explicit plume rise sources; uses file'
  PNTS:
    default: ''
    description: (File) Intermediate area-, mobile-, or point-source inventory created by Smkinven
  POUT:
    default: ''
    description: Processing source output file
  PRMAT:
