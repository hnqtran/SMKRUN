laypoint:
  EXPLICIT_PLUMES_YN:
    default: N
    description: 'Indicates whether only explicit plume rise sources should be calculated. Y: Process only explicit plume rise sources; automatically sets HOUR_PLUMEDATA_YN to Y N: Process all sources'
  FIRE_AREA:
    default: '0.0'
    description: Sets daily area burned in acres/day; only used when FIRE_PLUME_YN is set to Y and HOURLY_FIRE_YN is set to N.
  FIRE_BOTTOM_LAYER_1_YN:
    default: N
    description: Enforcing fire emissions vertical allocation starting from modeling layer 1 to Brigg's fire plume height top layer.
  FIRE_HFLUX:
    default: '0.0'
    description: Sets hourly heat flux value in BTU/hr; only used when FIRE_PLUME_YN is set to Y and HOURLY_FIRE_YN is set to N.
  FIRE_PLUME_YN:
    default: N
    description: 'Indicates if fire-specific plume rise calculations should be used. Y: Use fire-specific plume rise calculations for all sources N: Use traditional plume rise calculations based on stack parameters for all sources'
  GRIDDESC:
    default: ''
    description: (File) The GRIDDESC file is used to provide grid and projection information to SMOKE and can contain data for many different projections and many different grids. The format of the GRIDDESC file is available in the I/O API documentation at http://www.baronams.com/products/ioapi/GRIDDESC.html .
  GRID_CRO_3D:
    default: ''
    description: (File) Meteorology file produced by the meteorology preprocessor; only needed if using static layer information
  HOURLY_FIRE_YN:
    default: N
    description: 'Indicates if hourly fire data should be used; only checked when FIRE_PLUME_YN is set to Y. Y: Read hourly heat flux from PTMP file and daily area burned from PDAY file N: Get heat flux and area burned from environment variables FIRE_AREA and FIRE_HFLUX'
  HOUR_PLUMEDATA_YN:
    default: ''
    description: 'Y: Process only explicit plume rise sources; automatically sets to Y'
  IOAPI_ISPH:
    default: '19'
    description: Determines which USGS spheroid to use for grid-based calculations This environment variable can also be used to set custom spheroid representations. See the I/O API documentation for more information.
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Laypoint
  MET_CRO_2D:
    default: ''
    description: (File) Meteorology file produced by the meteorology preprocessor
  MET_CRO_3D:
    default: ''
    description: (File) Meteorology file produced by the meteorology preprocessor
  MET_DOT_3D:
    default: ''
    description: (File) Meteorology file produced by the meteorology preprocessor
  PDAY:
    default: ''
    description: (File) Daily point-source inventory file produced by Smkinven
  PELV:
    default: ''
    description: 'Y: Use the file to set elevated sources during run'
  PHOUR:
    default: ''
    description: 'Y: Use hourly data; requires file'
  PLAY:
    default: ''
    description: (File) Hourly plume rise layer fractions by source
  PLAY_EX:
    default: ''
    description: (File) Hourly plume rise layer fractions for explicit sources
  PLUME_GTEMP_NAME:
    default: TEMP2
    description: Sets ground temperature variable name from meteorology file for plume rise calcuation.
  PNTS:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  PTMP:
    default: ''
    description: 'Y: Read hourly heat flux from file and daily area burned from PDAY file'
  REPRTLAY:
    default: ''
    description: (File) Report file for plumes exceeding specified layer
  REP_LAYER_MAX:
    default: '-1'
    description: Layer number for reporting high plume rise; reporting is turned off if set to less than 1.
  SMK_EMLAYS:
    default: '-1'
    description: Number of emissions layers; must be at least 4 otherwise program will not run.
  SMK_SOURCE:
    default: blank
    description: 'Defines the type of sources to be processed. Valid values are A: Area processing B: Biogenic processing M: Mobile processing P: Point processing.'
  SMK_SPECELEV_YN:
    default: N
    description: 'Defines whether the Elevpoint output file PELV will be used to set elevated sources. Y: Use the PELV file to set elevated sources during run N: Let Laypoint plume rise calculation determine whether or not sources are elevated'
  USE_EDMS_DATA_YN:
    default: N
    description: 'Process EDMS aviation source elevation height as its plume rise and distributes the emissions into the layer where it belongs to. Y: Skip plume rise calculation and distribute EDMS aviation emissions into the layer where it belongs to using its elevation height. N: Do not process EDMS aviation sources'
  VELOC_RECALC:
    default: N
    description: 'Determines whether velocity should be recalculated based on hourly flow rates and stack diameter. Y: Recalculate velocity for hourly data N: Use velocity values from hourly inventory file'
  VERTICAL_SPREAD:
    default: '0'
    description: 'Sets the vertical spread method for determining the bottom and top heights of each plume. 0: Use the default Turner approach where plume thickness equals the amount of plume rise 1: Compute vertical spread using ambient temperature data'
met4moves:
  COSTCY:
    default: ''
    description: "(File) The COSTCY file is used to assign numeric codes to the various countries, states, and counties to be modeled; the file also provides information concerning default time zones and Daylight Savings observance. A header line can be used in this file to indicate that population data are contained in the file as the last column on each line of the /COUNTY/ packet. The header line and additional population column are optional. If it is present in the file, it must be on the first line of the file and use the following syntax: #POPULATION <year> where <year> is a 4-digit year. The country, state, and county codes in each section of this file must be sorted in increasing order. If they are not, the programs reading this file will give an error. The format of the COSTCY file is shown in Table 6.85, \u201CFormat for COSTCY \u201D ."
  ENDDATE:
    default: '0'
    description: Sets the overall episode end date; Julian format (YYYYDDD).
  GEOCODE_LEVEL1:
    default: ''
    description: "(File) The GEOCODE_LEVEL1 input file contains a 3 character code used to specify the Country-level Geographical Code. The COSTCY file will not be used if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each country in the gridded inventory data then they would create a GEOCODE_LEVEL1 file. The GEOCODE_LEVEL1 file is comma delimited as shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL1 file is shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D ."
  GEOCODE_LEVEL2:
    default: ''
