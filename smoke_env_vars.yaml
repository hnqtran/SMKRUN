  REPPG[T][S][C][_S|_L]:
    default: ''
    description: (File) Emission totals report file, produced if either MRG_REPSTA_YN or MRG_REPCNY_YN is set to Y
  SGINLNTS_L:
    default: ''
    description: (File) Emissions by source group, formatted as CMAQ in-line emissions data, produced if SMK_SRCGROUP_OUTPUT_YN is set to Y
  SGINLNTS_S:
    default: ''
    description: (File) Emissions by source group, formatted as CMAQ in-line emissions data, produced if SMK_SRCGROUP_OUTPUT_YN is set to Y
  SMKMERGE_CUSTOM_OUTPUT:
    default: N
    description: 'Defines his/her own output file names from Smkmerge . Manually define environment variables for those output file names below: [E|A|M|P]OUT : Processing source output file ELEV : Elevated-point-sources file, produced if SMK_ASCIIELEV_YN is set to Y; if PinG sources have also been selected, then the stack diameters listed in this file will be set to the negative value of their actual value. PING : CMAQ PinG file, produced if SMK_PING_METHOD is set to 1 INLN : CMAQ 2-D surface layer emissions file, produced if SMK_ELEV_METHOD is set to 2. For in-line processing plume rise processing, MRG_LAYERS_YN must set to N to create hourly speciated 2-D surface layer emissions file for CMAQ version 4.7 or later. REP[E|A|M|P]G : Emission total report file, produced if either MRG_REPSTA_YN or MRG_REPCNY_YN is set to Y'
  SMK_ASCIIELEV_YN:
    default: N
    description: 'Defines whether the program produces an ASCII elevated point sources file, suitable for postprocessing with the Ptsrce program in EPS2.0/EPS2.5. Y: Create the ASCII elevated point sources file N: Do not create the ASCII elevated point sources file'
  SMK_AVEDAY_YN:
    default: N
    description: 'Indicates whether or not to read average day emissions instead of annual emissions from the inventory file. Y: Read average day emissions N: Do not read average day emissions, use annual emissions instead. NOTE: This setting affects the Smkmerge results only when hourly emissions are not merged. To use hourly average-day emissions in Smkmerge , this variable must be set to Y for the Temporal program, so that average-day emissions will be used in creating the hourly emissions.'
  SMK_ELEV_METHOD:
    default: '0'
    description: "Defines the method to use in SMOKE for determining and processing elevated point sources. The setting chosen depends on the model output format needed from SMOKE. All PinG sources determined based on SMK_PING_METHOD will automatically be considered elevated sources (as defined specifically for the model for which you are creating emissions). 0: Treat all sources as potentially elevated, and let the Laypoint program determine which sources are elevated and which are not. This approach is appropriate only for SMOKE output for the CMAQ model. 1: Use the \u201C Elevated \u201D section of the PELVCONFIG configuration file to select specific sources. This approach can be used for any of the model output formats - CMAQ and UAM-style. For UAM-style emissions processing, this environment variable must be set to 1 and the PELVCONFIG file will be used to select specific sources. This method of processing is needed for UAM and CAM X because they require use of the cutoff method discussed\
      \ earlier. In rare cases of a very small inventory, it might be acceptable to specify 0 for this setting in UAM-style emissions processing, provided that you are sure that treating all sources as elevated sources in UAM-style models is acceptable. We do not recommend such an approach for typical SMOKE applications for UAM-style models. 2: Use the \u201C Elevated \u201D section of the PELVCONFIG configuration file to select specific sources. This approach can be used for in-line plume rise in CMAQ. Must set SMK_PING_METHOD = 0. For in-line plume rise processing in CMAQ, this environment variable must be set to 2 and the PELVCONFIG file will be used to select specific sources. To reduce the total number of plume rise calculations that would be done in the CMAQ in-line plume rise module, Elevpoint needs to group sources with nearly identical stack parameters. Elevpoint outputs stack group file that identifies elevated source locations and stack parameters for in-line plume rise calculation\
      \ in CMAQ. When using Smkmerge for in-line plume rise processing, MRG_LAYERS_YN must set to N to create hourly speciated 2-D surface layer emissions file. If SMKMERGE_CUSTOM_OUTPUT is set to Y, the output file for the in-line emissions is called INLNST_L."
  SMK_EMLAYS:
    default: '-1'
    description: Number of emissions layers; must be at least 4 otherwise program will not run. Used to set the default value for UAM_LAYERS when the Smkmerge output is to be used in UAM-V elevated-point-source output processing.
  SMK_PING_METHOD:
    default: '0'
    description: 'Defines the method to use in determining PinG point sources. 0: No PinG sources 1: Use PinG section of PELVCONFIG configuration file For all models that SMOKE supports use of PinG sources is optional. Some models may have limitations on the number of PinG sources supported, and you must make sure that these limitations are met; SMOKE does not automatically compare with these limitations, if any. For CMAQ, SMOKE will output a STACK_GROUPS file from the Elevpoint program and a PINGTS_[S|L] file from the Smkmerge program to support PinG. For UAM-style processing, SMOKE will flag PinG sources in the ASCII elevated file created by Smkmerge , and should be used with the SMK_ASCIIELEV_YN option set to Y to create this ASCII elevated file. Creates CMAQ PinG file or flags PinG sources in UAM-style elevated ASCII file (when the SMK_ASCIIELEV_YN environment variable is set to Y).'
  SMK_REPORT_TIME:
    default: '230000'
    description: Time for writing daily reports from program (HHMMSS).
  SMK_SRCGROUP_OUTPUT_YN:
    default: N
    description: 'Indicates if source apportionment emissions should be output Y: Group sources and output source apportionment files N: Do not perform any source apportionment processing'
  SMK_SUB_SECTOR_OUTPUT_YN:
    default: N
    description: 'Indicates if sub-sector source group emissions should be output Y: Group sources and output sub-sector source group files N: Do not perform sub-sector source group processing'
  SOURCE_GROUPS:
    default: ''
    description: (File) The SOURCE_GROUPS file is used to define groups of sources when processing emissions for source apportionment. Movesmrg and Smkmerge read this file when SMK_SRCGROUP_OUTPUT_YN is set to Y. When reading the SOURCE_GROUPS file, SMOKE will skip lines with data that doesn't apply to the current source category. Lines that contain a plant ID or point ID will be skipped when processing area, biogenic, or mobile sources. Lines containing an SCC will be skipped when processing biogenic sources. If SMOKE encounters lines with duplicate grouping information (i.e. FIPS, SCC, point source characteristics), an error will be printed to the log and the program will quit. Multiple grouping criteria can be assigned to the same source group ID by using additional lines. In the example below, all sources with SCCs 2102001000, 2102002000, and 2102004000 will be assigned to source group 1.
  SPC_INPUT:
    default: ''
    description: _S = mass-based speciation ( )
  SRCGROUPS_OUT:
    default: ''
    description: (File) Source group information, produced if SMK_SRCGROUP_OUTPUT_YN is set to Y
  SRCGRP_REPORT:
    default: ''
    description: (File) Source group report file, produced if SMK_SRCGROUP_OUTPUT_YN or SMK_SUB_SECTOR_OUTPUT_YN is set to Y
  STACK_GROUPS:
    default: ''
    description: "(File) Type: I/O API NetCDF - adapted gridded format Summary: I/O API intermediate file and output file for CMAQ. See Section 7.3.2, \u201C STACK_GROUPS \u201D for more information."
  SUBOUT##GTS_L:
    default: ''
    description: (File) Emissions by sub-sector source group ID (##) produced if SMK_SUB_SECTOR_OUTPUT_YN is set to Y
  SUBOUT##GTS_S:
    default: ''
    description: (File) Emissions by sub-sector source group ID (##) produced if SMK_SUB_SECTOR_OUTPUT_YN is set to Y
  UAM4_DIFFBREAK_UNIT:
    default: '0'
    description: DIFFBREAK file unit number in the elevated-point-source file.
  UAM4_HTLOWR:
    default: '20'
    description: "Minimum height (in meters) of cells between the surface and the \u201C diffbreak \u201D in the elevated-point-source file."
  UAM4_HTSFC:
    default: '0'
    description: Height of the surface layer (in meters) in the elevated-point-source file.
  UAM4_HTUPPR:
    default: '100'
    description: "Minimum height (in meters) of cells between the \u201C diffbreak \u201D and the top of the model in the elevated-point-source file."
  UAM4_LAYABOVE:
    default: UAM_LAYERS - UAM4_LAYBELOW
    description: "Number of layers above the \u201C diffbreak \u201D in the elevated-point-source file."
  UAM4_LAYBELOW:
    default: '3'
    description: "Number of layers below the \u201C diffbreak \u201D in the elevated-point-source file."
  UAM4_METSCALARS_UNIT:
    default: '15'
    description: "METSCALARS file unit number in the elevated-point-source file. Used only for UAM_VERTICAL_METHOD set to \u201C PLUMERISE \u201D."
  UAM4_REGIONTOP_UNIT:
    default: '0'
    description: REGIONTOP file unit number in the elevated-point-source file.
  UAM4_TEMPERATUR_UNIT:
    default: '14'
    description: "TEMPERATUR file unit number in the elevated-point-source file. Used only for UAM_VERTICAL_METHOD set to \u201C PLUMERISE \u201D."
  UAM4_WIND_UNIT:
    default: '16'
    description: "WIND file unit number in the elevated-point-source file. Used only for UAM_VERTICAL_METHOD set to \u201C PLUMERISE \u201D."
  UAM_LAYERS:
    default: set by value of SMK_EMLAYS
    description: Number of layers to output to the elevated-point-source file.
  UAM_NOTE:
    default: "\u201C UAM elev pt emis from Smkmerge \u201D"
    description: Message to appear as a note in the elevated-point-source file.
  UAM_NPARAM:
    default: '20'
    description: Number of parameters for control packet to appear in the elevated-point-source file.
  UAM_PRINT_LOCATIONS:
    default: '0'
    description: Flag printed in the elevated-point-source file to control whether Ptsrce will print the locations table. 0=No; 1=Yes.
  UAM_PRINT_METHODS:
    default: '0'
    description: Flag printed in the elevated-point-source file to control whether Ptsrce will print the methods table. 0=No; 1=Yes.
  UAM_PRINT_OUTGRD:
    default: '0'
    description: Flag printed in the elevated-point-source file to control whether Ptsrce will print the output grid. 0=No; 1=Yes.
  UAM_PRINT_UNITS:
    default: '0'
    description: Flag printed in the elevated-point-source file to control whether Ptsrce will print the units table. 0=No; 1=Yes.
  UAM_PRINT_VALUES:
    default: '0'
    description: Flag printed in the elevated-point-source file to control whether Ptsrce will print the values table. 0=No; 1=Yes.
  UAM_PRINT_VERTMETH:
    default: '0'
    description: Flag printed in the elevated-point-source file to control whether Ptsrce will print the vertical methods table. 0=No; 1=Yes.
  UAM_PTSRCE_OUTUNIT:
    default: '20'
    description: Ptsrce output file unit number in the elevated-point-source file.
  UAM_VERTICAL_METHOD:
    default: STACKHGT
    description: Vertical method in the elevated-point-source file. Appropriate values are STACKHGT and PLUMERISE.
  USE_EXP_GEO_CODES:
    default: N
    description: If set to Y, then use GEOCODE_LEVEL[1-4] files instead of the COSTCY file to define expanded geographical detail such as country-level(GEOCODE_LEVEL1), country/state-level (GEOCODE_LEVEL2), country/state/county-level (GEOCODE_LEVEL3) or country/state/county/tribal-level (GEOCODE_LEVEL4).
spcmat:
  AREA:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  ASMAT_L:
    default: ''
    description: (File) Mole-based speciation matrix
  ASMAT_S:
    default: ''
    description: (File) Mass-based speciation matrix
  ASSUP:
    default: ''
    description: (File) Speciation supplemental file
  CMB_CHKFRACS:
    default: Y
    description: 'Check whether the sum of multiple speciation profile split factors is equal to 1.0 or not. Y: Gives an error if the sume of split factors is not 1.0 N: Do not check the sume of split factors'
  DEFAULT_CONV_FAC_ERROR:
    default: N
    description: "Defines whether the program treats as an error when there is no matched VOC to TOG conversion factor available in the pollutant-to-pollutant conversion file ( Section 6.5.1, \u201C GSCNV : Pollutant-to-pollutant conversion file\u201D ). Y: Use speciation tagging cross-reference file N: Do not use speciation tagging cross-reference file"
  FULLSCC_ONLY:
    default: N
    description: Disables any sub-SCC cross-reference assignments that would otherwise be included in the cross-reference hierarchy. For example, the left-7, left-4, and left-2 levels of nonpoint and mobile SCCs would never be used. This is useful when zeros are a natural part of the SCC that the user does not want to assume are present for cross-reference hierarchy purposes. This option affects all Cntlmat input packets that use SCC assignments as part of their hierarchy. In this context, this option affects cross-referencing for the speciation cross-reference files by preventing left-7 SCC assignments. The application GSCNV files are not affected by this option when using FIPS/SCC assignments, and will continue to use left-7 SCC assignments even when FULLSCC_ONLY is set to "Y".
  GSCNV:
    default: ''
    description: "(File) The pollutant-to-pollutant conversion factors file is required when there is a mismatch between the pollutant in the inventory and the pollutant for which the speciation profiles have been developed. The typical example is when the inventory has VOC (or ROG), but the speciation profiles are developed for TOG. SMOKE permits such a factor to be applied to any pollutant. The same format is used by all source categories. These factors can be applied to the inventory using one of two assignment approaches: either by FIPS/SCC or by Speciation Profile ID. The same approach must be used for all sources in a single run of Spcmat. Historically in SMOKE, the FIPS/SCC approach has been used; however, starting with SMOKE version 2.3, users may instead apply these factors by Speciation Profile ID. For assignment of factors using the state/county FIPS and SCC codes, the available combinations and hierarchies for applying the factors are the same as for the speciation cross-reference\
      \ (see Section 4.16, \u201C Spcmat \u201D ), with the exception of the plant ID and other more specific source characteristics for point sources. For assignment of the factors using Speciation Profile ID, there is no assignment hierarchy - whatever profile was assigned to a source by the GSREF file will be used to choose the factor to apply from the GSCNV file, for the appropriate pollutants. To assign these factors by Speciation Profile ID, a special header line is needed, as described below. SMOKE version 2.3 is backward compatible with previous GSCNV files used with earlier versions. The GSCNV file is not needed if there is no mismatch between the inventory and the pollutants in the speciation profiles file. The Spcmat program will input and use this file only when the POLLUTANT_CONVERSION environment variable is set to Y. If emissions types (emission process/pollutant combinations) are being used, as with mobile source processing using the Movesmrg program (see Section 2.7.4.9,\
      \ \u201C MOVES Emission Processes by Emission Rate Tables\u201D ), the emission type must be listed instead of the pollutant. For example, if exhaust running VOC emissions were being converted to exhaust TOG, then EXR__VOC and EXR__TOG would need to appear in their respective columns on the header line (line 1 in the \"old\" format below or in the first and second columns in the \"new\" format). It would not be correct to put only VOC and TOG. All emission types must be listed, or the conversion factor that will be applied is 1. This approach permits conversion factors that are specific to each emission process (e.g., different conversions for EXR and EXS). The format of the GSCNV file for Speciation Profile ID assignments is shown in Table 6.40, \u201CFormat for GSCNV (using Speciation Profile ID assignments)\u201D . The format is consistent with the format created by the Emission Modeling Framework Speciation Tool."
  GSPRO:
    default: ''
    description: "(File) The speciation profile file, GSPRO , contains the factors that are used to separate aggregated inventory pollutant emissions totals into emissions of model species required by the AQM. In traditional ozone air quality modeling, this file contained split factors only for VOC. In SMOKE, all inventory pollutants need to be represented in this file, even if it is only to indicate that a pollutant is not split into any model species (e.g., CO emissions would have a \u201C split factor \u201D of 1.0). The format of the GSPRO file is shown in Table 6.41, \u201CFormat for GSPRO \u201D . For support of combining criteria and toxic VOC using the NONHAPVOC calculation feature of SMOKE, the GSPRO file (starting in version 2.3 of SMOKE) includes a special header that defines the meaning of NONHAPVOC. This is the new #NHAP header, described below. This header keyword will be treated as a comment line by previous versions of SMOKE. The header lines define NONHAPVOC (and/or NONHAPTOG)\
      \ by listing all of the VOC compounds that were assumed to be removed from VOC (or TOG) when the speciation profile factors for NONHAPVOC (or NONHAPTOG) were calculated. When using this file, Spcmat compares this list with the list from the Inventory Table (\"VOC or TOG Component\" field = V or T and \"Explicit in Mechanism = \"N\"). This new header is included in this file so that the file is self-describing with respect to the definition of NONHAPVOC and NONHAPTOG. The format supports header lines (using a # symbol in position 1 of any line) in any part of the file."
  GSREF:
    default: ''
    description: "(File) 6.5.5.1. Area- and mobile-source speciation cross-reference file entries 6.5.5.2. Point-source speciation cross-reference file entries The speciation cross-reference file is used to match the emission sources with the speciation profiles in the GSPRO file. The GSREF file uses a header to define the point-source unique characteristics. The same file can be used for all source categories; the SMOKE programs use only the applicable entries in the file. The way that the file is applied in SMOKE ensures that the most-specific matches override the less-specific ones. A description of how the speciation cross-reference is applied to the inventory is provided in Section 4.16, \u201C Spcmat \u201D . When the special keyword \u201C COMBO \u201D is placed in the speciation profile code column, all sources matching the cross-reference entry should use a combination speciation profile provided in Section 6.5.4, \u201C GSPRO_COMBO : Combination speciation profiles file \u201D\
      \ . Using the profiles listed in the GSPRO_COMBO file, Spcmat can use the fractions and the information from the GSPRO and GSCNV for the profiles provied to create weighted profiles for the matching source. As of SMOKE version 4.5, the chemical speciation profile split factor column M is added into the Table 6.45, \u201CFormat for point-source GSREF \u201D for users to apply multiple speciation profiles to a single inventory source. Unlike GSPRO_COMBO approach, this approach can be used to an individual stationary point source level."
  INVTABLE:
    default: ''
    description: "(File) The INVTABLE file replaces the SIPOLS and ACTVNAMS files previously used by SMOKE. Smkinven uses the inventory table to select the inventory pollutants that will be output by Smkinven . The valid pollutants are again checked at the end of SMOKE processing by Smkmerge , to ensure that the program knows about all of the pollutants and also to set the order of the output variables (output species are sorted by the order of the pollutants in the inventory table and for multiple species per pollutant, by alphabetical order). You can use the INVTABLE to drop inventory pollutants in Smkinven without having to modify the inventory files, simply by modifying INVTABLE . The units used in the SMOKE intermediate files are listed in this file. The SMOKE programs Spcmat , and Movesmrg use this file to determine which pollutants should be included in the NONHAPVOC or NONHAPTOG calculation. The inventory table also provides a way to assign the SPECIATE4 species ID to any pollutant\
      \ that is a Hazardous Air Pollutant (HAP) VOC. This assignment is not used directly by SMOKE, but rather is used by the Speciation Tool when creating VOC speciation profiles. This is used only when creating speciation profiles to support SMOKE runs that will combine criteria VOC and HAP VOC emissions, using the NHAPEXCLUDE file in the Smkinven program. More specifically, this can be done for the purpose of using VOC HAP emissions to augment VOC speciation profiles. Since the Inventory Table provides information to the Speciation Tool, this field is not used by SMOKE, but is included for continued integration of SMOKE inputs with the Speciation Tool. As described in the Smkinven documentation in Chapter 6, Smkinven in some cases will create \"no-integrate\" (NOI) HAP pollutant emissions from the inventory data by renaming the pollutant with a \"_NOI\" suffix applied to the end of the Inventory Data Name from the Inventory Table for such pollutants. Similarly, Smkinven will automatically\
      \ add all possibly needed \"_NOI\" pollutant names to the internal master list of valid pollutant names. This list would otherwise be limited to the contents of the INVTABLE file entries where the Keep column contains an \"Y\". Smkinven inserts these names in the master list such that the \"_NOI\" version of the pollutant name appears in the list just after the polutant on which the name is based. The inserted entries that include \"_NOI\" are made when the following values are included for the pollutant in the INVTABLE file. A \"Y\" appears in the \"Keep\" field A \"V\" or \"T\" appears in the \"VOC or TOG component\" field A \"Y\" appears in the \"Model species\" field Something other than \"Y\" appears in the \"Explicit in mechanism\" field (e.g., \"N\" or blank) It is possible for a user to choose two pollutants that result in double counting the emissions from the inventory. For example, you may want to model both benzo(a)pyrene and 7-PAH which, would result in the emissions associated\
      \ with CAS number 205992 (for benzo(a)pyrene) to be duplicated. The user is responsible for the choices made and the resulting changes in inventory mass. The format of the INVTABLE is shown in Table 6.91, \u201CFormat for INVTABLE \u201D ."
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Spcmat
  MEPROC:
    default: ''
    description: "(File) The MEPROC file, used by Spcmat lists the pollutants that will be generated by MOVES for modeling on-roadway and off-network mobile sources. The available emission processes are listed in Section 2.7.4.9, \u201C MOVES Emission Processes by Emission Rate Tables\u201D . The format of the MEPROC file is shown in Table 6.64, \u201CFormat for MEPROC \u201D ."
  MOBL:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  MSMAT_L:
    default: ''
    description: (File) Mole-based speciation matrix
  MSMAT_S:
    default: ''
    description: (File) Mass-based speciation matrix
  MSSUP:
    default: ''
    description: (File) Speciation supplemental file
  NO_SPC_ZERO_EMIS:
    default: N
    description: 'Defines whether the program applies the speciation profiles to zero emission sources. Y: Skip applying speciation profile to zero emission source N: Do not skip'
  PNTS:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  POLLUTANT_CONVERSION:
    default: N
    description: "Defines whether the program uses the pollutant-to-pollutant conversion file ( Section 6.5.1, \u201C GSCNV : Pollutant-to-pollutant conversion file\u201D ). Y: Use conversion file N: Do not use conversion file"
  PSMAT_L:
    default: ''
    description: (File) Mole-based speciation matrix
  PSMAT_S:
    default: ''
    description: (File) Mass-based speciation matrix
  PSSUP:
    default: ''
    description: (File) Speciation supplemental file
  REPORT_DEFAULTS:
    default: Y
    description: 'Defines whether or not the program reports when a source uses the default cross-reference. Y: List sources in the log file when they use default cross-reference N: Do not list sources that use the default cross-reference.'
  SMK_SOURCE:
    default: blank
    description: 'Defines the type of sources to be processed. Valid values are A: Area processing B: Biogenic processing M: Mobile processing P: Point processing.'
  SPCMAT_PERIOD:
    default: '1'
    description: "Defines period number which could be month. It must match to the period number in ( Section 6.5.4, \u201C GSPRO_COMBO : Combination speciation profiles file \u201D )."
  SRC_TAGGING:
    default: N
    description: "Defines whether the program uses the speciation tagging cross-reference file or not ( Section 6.5.6, \u201C GSTAG : Speciation tagging cross-reference file \u201D ). Y: Use speciation tagging cross-reference file N: Do not use speciation tagging cross-reference file"
  USE_REF_COUNTY_MAP_YN:
    default: N
    description: "Defines whether the program uses the county reference county file to assign speciation profiles by reference county or not ( Section 6.9.2.1.3, \u201C MCXREF : Mobile representative county cross-reference file\u201D ). Y: Use inventory to reference county cross-reference file N: Do not use county cross-reference file"
temporal:
  AREA:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  ATMP:
    default: ''
    description: (File) Hourly emissions by source; if using elevated point sources as part of point-source processing, this file contains only the layer-1 emissions
  ATPRO_DAILY:
    default: ''
    description: (File) Month-to-day Temporal profiles
  ATPRO_HOURLY:
    default: ''
    description: (File) Day-to-hour Temporal profiles
  ATPRO_HOURLY_NCF:
    default: ''
    description: (File) Meteorological-based hourly Temporal profiles
  ATPRO_MONTHLY:
    default: ''
    description: (File) Monthly Temporal profiles
  ATPRO_WEEKLY:
    default: ''
    description: (File) Weekly Temporal profiles
  ATREF:
    default: ''
    description: "(File) The ATREF , MTREF , and PTREF files contain the area-, mobile-, and point-source cross-reference records for assigning the temporal profiles to the sources. If needed, the same file can be used for area-, mobile-, or point-source categories, but more fields are used for mobile than for area, and more fields are used for point than for mobile. Section 4.17, \u201C Temporal \u201D provides a list of the matching hierarchies that SMOKE uses when applying the file to an inventory. If a field is blank, it must be set to -9. Between weekly and daily temporal profiles, daily Profiles will take precedence weekly profiles. Within hourly diurnal profiles, the processing occurs as follows (1) day-to-hour hourly profiles (i.e., Monday,,,,,Sunday), (2) Weekday/Weekend hourly profiles, and (3) All days (Monday-Sunday) hourly profiles. However, date-specific houlry temporal profiles from [A|M|P]TPRO_HOURLY_NCF input file will take precedence any types of temporal profiles. This\
      \ date-specific hourly temporal profiles NetCDF input file contains annual total ( ANNTOT ), monthly total ( MONTOT ), daily total ( DAYTOT ) and hourly total ( HRLTOT ) to compute year-to-hour, month-to-hour, day-to-hour profiles to calculate hourly total depending on types of inventory data (annual, monthly or daily inventory). If inventory is annual total, year-to-hour profiles will be used to convert annual total to hourly total emissions. If inventory is monthly total, month-to-hour profiles will be used to compute hourly total from monthly total inventory. Within the Temporal program, the processing occurs as follows: Temporal profiles are assigned for all sources. Monthly (year-to-month) temporal profiles can be applied. Daily (month-to-day) temporal profiles can be applied. Weekly (month-to-weekly) temporal profiles can be applied. Day-of-week specific hourly diurnal temporal profiles (Monday,,,Sunday, Weekday, Weekend, or All days) are applied. Date-specific hourly diurnal\
      \ temporal profiles (year-to-hour, month-to-hour or day-to-hour) can be applied. Day-specific emissions or activities are read in and used to overwrite daily emissions for the appropriate sources Hour-specific emissions or activities are read in and used to overwrite hourly emissions for the appropriate sources. NOTE: Date-specific houlry diurnal temporal profiles require FIPS and SCC specific entries in [A|M|P]TREF input file. The pollutant field allows the user to assign a different temporal profile for each pollutant associated with a given source. This is an optional approach; if you do not want to use pollutant as a characteristic in assigning temporal profiles, you can put a \u201C -9 \u201D in the pollutant field. In that case, all pollutants for a given source will be assigned that temporal profile. The country/state/county code is defined as follows:"
  ATSUP:
    default: ''
    description: (File) Temporal allocation supplemental file
  COSTCY:
    default: ''
    description: "(File) The COSTCY file is used to assign numeric codes to the various countries, states, and counties to be modeled; the file also provides information concerning default time zones and Daylight Savings observance. A header line can be used in this file to indicate that population data are contained in the file as the last column on each line of the /COUNTY/ packet. The header line and additional population column are optional. If it is present in the file, it must be on the first line of the file and use the following syntax: #POPULATION <year> where <year> is a 4-digit year. The country, state, and county codes in each section of this file must be sorted in increasing order. If they are not, the programs reading this file will give an error. The format of the COSTCY file is shown in Table 6.85, \u201CFormat for COSTCY \u201D ."
  DAY_SPECIFIC_YN:
    default: N
    description: 'Defines whether to import day-specific inventory data. Y: Import day-specific data N: Do not import day-specific data.'
  FULLSCC_ONLY:
    default: N
    description: Disables any sub-SCC cross-reference assignments that would otherwise be included in the cross-reference hierarchy. For example, the left-7, left-4, and left-2 levels of nonpoint and mobile SCCs would never be used. This is useful when zeros are a natural part of the SCC that the user does not want to assume are present for cross-reference hierarchy purposes. This option affects all Cntlmat input packets that use SCC assignments as part of their hierarchy. In this context, this option affects cross-referencing for the temporal cross-reference files by preventing left-7 SCC assignments.
  GEOCODE_LEVEL1:
    default: ''
    description: "(File) The GEOCODE_LEVEL1 input file contains a 3 character code used to specify the Country-level Geographical Code. The COSTCY file will not be used if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each country in the gridded inventory data then they would create a GEOCODE_LEVEL1 file. The GEOCODE_LEVEL1 file is comma delimited as shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL1 file is shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D ."
  GEOCODE_LEVEL2:
    default: ''
    description: "(File) The GEOCODE_LEVEL2 input file contains up to 6 character code to specify the Country/State-level Geographical Codes which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each state level region for each country in the gridded inventory data then they would create a GEOCODE_LEVEL2 file. The GEOCODE_LEVEL2 file is comma delimited as shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL2 file is shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D ."
  GEOCODE_LEVEL3:
    default: ''
    description: "(File) The GEOCODE_LEVEL3 input file contains up to 9 character code to specify the Country/State-level/County-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL3 file is comma delimited as shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL3 file is shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D ."
  GEOCODE_LEVEL4:
    default: ''
    description: "(File) The GEOCODE_LEVEL4 input file contains a 12 character code to specify the Country/State/County/Tribal-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL4 file is comma delimited as shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL4 file is shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D ."
  HOLIDAYS:
    default: ''
    description: "(File) SMOKE can process holidays as specific days of the week in order to better model activity patterns. The HOLIDAYS file is used to indicate which days should receive special treatment and how the days should be treated. The format of this file is shown in Table 6.35, \u201CFormat for HOLIDAYS \u201D ."
  HOURLY_TPROF_BASE:
    default: blank
    description: "Defines the base of hourly temporal profiles. This flag is only applicable when hourly temporal profiles generated by Gentpro is available for Temporal to use. For a proper processing of hourly temporal profiles from Gentpro , user must let Temporal know the basis of hourly temporal profiles (i.e., hour of day, hour of month or hour of year). Gentpro outputs hourly temporal profiles IDs into temporal cross-reference input file ( [A|M|P]TREF ). See detail information at Section 6.3.2, \u201C [A|M|P]TREF : Temporal cross-reference file\u201D . If HOUR_PROFID column is filled by Gentpro , user must define the base of hourly profiles to correctly convert annual/monthly/daily inventories. If processing monthly inventory, user must set it to 'MONTH'. YEAR: Convert raw annual inventory to hourly inventory values. MONTH: Convert calculated monthly inventory to hourly inventory values."
  HOUR_SPECIFIC_YN:
    default: N
    description: 'Defines whether to import hour-specific inventory data. Y: Import hour-specific data N: Do not import hour-specific data.'
  INVTABLE:
    default: ''
    description: "(File) The INVTABLE file replaces the SIPOLS and ACTVNAMS files previously used by SMOKE. Smkinven uses the inventory table to select the inventory pollutants that will be output by Smkinven . The valid pollutants are again checked at the end of SMOKE processing by Smkmerge , to ensure that the program knows about all of the pollutants and also to set the order of the output variables (output species are sorted by the order of the pollutants in the inventory table and for multiple species per pollutant, by alphabetical order). You can use the INVTABLE to drop inventory pollutants in Smkinven without having to modify the inventory files, simply by modifying INVTABLE . The units used in the SMOKE intermediate files are listed in this file. The SMOKE programs Spcmat , and Movesmrg use this file to determine which pollutants should be included in the NONHAPVOC or NONHAPTOG calculation. The inventory table also provides a way to assign the SPECIATE4 species ID to any pollutant\
      \ that is a Hazardous Air Pollutant (HAP) VOC. This assignment is not used directly by SMOKE, but rather is used by the Speciation Tool when creating VOC speciation profiles. This is used only when creating speciation profiles to support SMOKE runs that will combine criteria VOC and HAP VOC emissions, using the NHAPEXCLUDE file in the Smkinven program. More specifically, this can be done for the purpose of using VOC HAP emissions to augment VOC speciation profiles. Since the Inventory Table provides information to the Speciation Tool, this field is not used by SMOKE, but is included for continued integration of SMOKE inputs with the Speciation Tool. As described in the Smkinven documentation in Chapter 6, Smkinven in some cases will create \"no-integrate\" (NOI) HAP pollutant emissions from the inventory data by renaming the pollutant with a \"_NOI\" suffix applied to the end of the Inventory Data Name from the Inventory Table for such pollutants. Similarly, Smkinven will automatically\
      \ add all possibly needed \"_NOI\" pollutant names to the internal master list of valid pollutant names. This list would otherwise be limited to the contents of the INVTABLE file entries where the Keep column contains an \"Y\". Smkinven inserts these names in the master list such that the \"_NOI\" version of the pollutant name appears in the list just after the polutant on which the name is based. The inserted entries that include \"_NOI\" are made when the following values are included for the pollutant in the INVTABLE file. A \"Y\" appears in the \"Keep\" field A \"V\" or \"T\" appears in the \"VOC or TOG component\" field A \"Y\" appears in the \"Model species\" field Something other than \"Y\" appears in the \"Explicit in mechanism\" field (e.g., \"N\" or blank) It is possible for a user to choose two pollutants that result in double counting the emissions from the inventory. For example, you may want to model both benzo(a)pyrene and 7-PAH which, would result in the emissions associated\
      \ with CAS number 205992 (for benzo(a)pyrene) to be duplicated. The user is responsible for the choices made and the resulting changes in inventory mass. The format of the INVTABLE is shown in Table 6.91, \u201CFormat for INVTABLE \u201D ."
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Temporal
  MOBL:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  MTMP:
    default: ''
    description: (File) Hourly emissions by source; if using elevated point sources as part of point-source processing, this file contains only the layer-1 emissions
  MTPRO_DAILY:
    default: ''
    description: (File) Month-to-day Temporal profiles
  MTPRO_HOURLY:
    default: ''
    description: (File) Day-to-hour Temporal profiles
  MTPRO_HOURLY_NCF:
    default: ''
    description: (File) Meteorological-based hourly Temporal profiles
  MTPRO_MONTHLY:
    default: ''
    description: (File) Monthly Temporal profiles
  MTPRO_WEEKLY:
    default: ''
    description: (File) Weekly Temporal profiles
  MTREF:
    default: ''
    description: "(File) The ATREF , MTREF , and PTREF files contain the area-, mobile-, and point-source cross-reference records for assigning the temporal profiles to the sources. If needed, the same file can be used for area-, mobile-, or point-source categories, but more fields are used for mobile than for area, and more fields are used for point than for mobile. Section 4.17, \u201C Temporal \u201D provides a list of the matching hierarchies that SMOKE uses when applying the file to an inventory. If a field is blank, it must be set to -9. Between weekly and daily temporal profiles, daily Profiles will take precedence weekly profiles. Within hourly diurnal profiles, the processing occurs as follows (1) day-to-hour hourly profiles (i.e., Monday,,,,,Sunday), (2) Weekday/Weekend hourly profiles, and (3) All days (Monday-Sunday) hourly profiles. However, date-specific houlry temporal profiles from [A|M|P]TPRO_HOURLY_NCF input file will take precedence any types of temporal profiles. This\
      \ date-specific hourly temporal profiles NetCDF input file contains annual total ( ANNTOT ), monthly total ( MONTOT ), daily total ( DAYTOT ) and hourly total ( HRLTOT ) to compute year-to-hour, month-to-hour, day-to-hour profiles to calculate hourly total depending on types of inventory data (annual, monthly or daily inventory). If inventory is annual total, year-to-hour profiles will be used to convert annual total to hourly total emissions. If inventory is monthly total, month-to-hour profiles will be used to compute hourly total from monthly total inventory. Within the Temporal program, the processing occurs as follows: Temporal profiles are assigned for all sources. Monthly (year-to-month) temporal profiles can be applied. Daily (month-to-day) temporal profiles can be applied. Weekly (month-to-weekly) temporal profiles can be applied. Day-of-week specific hourly diurnal temporal profiles (Monday,,,Sunday, Weekday, Weekend, or All days) are applied. Date-specific hourly diurnal\
      \ temporal profiles (year-to-hour, month-to-hour or day-to-hour) can be applied. Day-specific emissions or activities are read in and used to overwrite daily emissions for the appropriate sources Hour-specific emissions or activities are read in and used to overwrite hourly emissions for the appropriate sources. NOTE: Date-specific houlry diurnal temporal profiles require FIPS and SCC specific entries in [A|M|P]TREF input file. The pollutant field allows the user to assign a different temporal profile for each pollutant associated with a given source. This is an optional approach; if you do not want to use pollutant as a characteristic in assigning temporal profiles, you can put a \u201C -9 \u201D in the pollutant field. In that case, all pollutants for a given source will be assigned that temporal profile. The country/state/county code is defined as follows:"
  MTSUP:
    default: ''
    description: (File) Temporal allocation supplemental file
  OUTPUT_LOCAL_TIME:
    default: N
    description: 'Defines whether the program processes daily/hourly inventories in local time or not. Y: Process daily/hourly inventories in local time. No time zone shift. N: Apply time zone shift.'
  OUTZONE:
    default: '0'
    description: "Indicates offset from Greenwich Mean Time (GMT) for episode start date and time. OUTZONE should be set to the standard time for the time zone of interest; SMOKE will adjust to Daylight Saving time for episodes that are during periods and in regions where Daylight Saving time applies. Table 2.9, \u201CExample OUTZONE settings and their associated time zones\u201D provides allowed values for OUTZONE . The CMAQ model expects OUTZONE to be 0, while other models such as UAM-IV, UAM-V and CAM X often use time zone 5. All models expect that the emissions and the meteorology data provided to the model will have a consistent time zone. SMOKE expects that the meteorology data will be in GMT. Note that SMOKE expects OUTZONE to be set as a positive number for time zones in the Western Hemisphere, although standard notation would list these as negative values. For example, Eastern Standard Time is -5:00 hours from GMT, but OUTZONE for EST in SMOKE is 5."
  PDAY:
    default: ''
    description: (File) Day-specific intermediate inventory file created by Smkinven (required if DAY_SPECIFIC_YN is set to Y)
  PHOUR:
    default: ''
    description: (File) Hour-specific intermediate inventory file created by Smkinven (required if HOUR_SPECIFIC_YN is set to Y)
  PNTS:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  PROCDATES:
    default: ''
    description: "(File) SMOKE can process specific sequential or non-seqential days of the year. The PROCDATES file is used to indicate which days should be processed temporally. The format of this file is shown in Table 6.36, \u201CFormat for PROCDATES \u201D ."
  PTMP:
    default: ''
    description: (File) Hourly emissions by source; if using elevated point sources as part of point-source processing, this file contains only the layer-1 emissions
  PTPRO_DAILY:
    default: ''
    description: (File) Month-to-day Temporal profiles
  PTPRO_HOURLY:
    default: ''
    description: (File) Day-to-hour Temporal profiles
  PTPRO_HOURLY_NCF:
    default: ''
    description: (File) Meteorological-based hourly Temporal profiles
  PTPRO_MONTHLY:
    default: ''
    description: (File) Monthly Temporal profiles
  PTPRO_WEEKLY:
    default: ''
    description: (File) Weekly Temporal profiles
  PTREF:
    default: ''
    description: "(File) The ATREF , MTREF , and PTREF files contain the area-, mobile-, and point-source cross-reference records for assigning the temporal profiles to the sources. If needed, the same file can be used for area-, mobile-, or point-source categories, but more fields are used for mobile than for area, and more fields are used for point than for mobile. Section 4.17, \u201C Temporal \u201D provides a list of the matching hierarchies that SMOKE uses when applying the file to an inventory. If a field is blank, it must be set to -9. Between weekly and daily temporal profiles, daily Profiles will take precedence weekly profiles. Within hourly diurnal profiles, the processing occurs as follows (1) day-to-hour hourly profiles (i.e., Monday,,,,,Sunday), (2) Weekday/Weekend hourly profiles, and (3) All days (Monday-Sunday) hourly profiles. However, date-specific houlry temporal profiles from [A|M|P]TPRO_HOURLY_NCF input file will take precedence any types of temporal profiles. This\
      \ date-specific hourly temporal profiles NetCDF input file contains annual total ( ANNTOT ), monthly total ( MONTOT ), daily total ( DAYTOT ) and hourly total ( HRLTOT ) to compute year-to-hour, month-to-hour, day-to-hour profiles to calculate hourly total depending on types of inventory data (annual, monthly or daily inventory). If inventory is annual total, year-to-hour profiles will be used to convert annual total to hourly total emissions. If inventory is monthly total, month-to-hour profiles will be used to compute hourly total from monthly total inventory. Within the Temporal program, the processing occurs as follows: Temporal profiles are assigned for all sources. Monthly (year-to-month) temporal profiles can be applied. Daily (month-to-day) temporal profiles can be applied. Weekly (month-to-weekly) temporal profiles can be applied. Day-of-week specific hourly diurnal temporal profiles (Monday,,,Sunday, Weekday, Weekend, or All days) are applied. Date-specific hourly diurnal\
      \ temporal profiles (year-to-hour, month-to-hour or day-to-hour) can be applied. Day-specific emissions or activities are read in and used to overwrite daily emissions for the appropriate sources Hour-specific emissions or activities are read in and used to overwrite hourly emissions for the appropriate sources. NOTE: Date-specific houlry diurnal temporal profiles require FIPS and SCC specific entries in [A|M|P]TREF input file. The pollutant field allows the user to assign a different temporal profile for each pollutant associated with a given source. This is an optional approach; if you do not want to use pollutant as a characteristic in assigning temporal profiles, you can put a \u201C -9 \u201D in the pollutant field. In that case, all pollutants for a given source will be assigned that temporal profile. The country/state/county code is defined as follows:"
  PTSUP:
    default: ''
    description: (File) Temporal allocation supplemental file
  RENORM_TPROF:
    default: Y
    description: 'Defines whether Temporal normalizes the temporal profiles or uses them as they exist in the data file. If the profiles are specified as decimal values and sum to 1, then specify N. Otherwise, specify Y and the program will sum the values associated with each profile and then divide each value by the sum, thereby creating a normalized profile. Y: Normalize the temporal profiles N: Use the temporal profile values as they exist in the data file'
  REPORT_DEFAULTS:
    default: Y
    description: 'Defines whether or not the program reports when a source uses the default cross-reference. Y: List sources in the log file when they use default cross-reference N: Do not list sources that use the default cross-reference.'
  SMK_AVEDAY_YN:
    default: N
    description: 'Indicates whether or not to read average day emissions instead of annual emissions from the inventory file. Y: Read average day emissions N: Do not read average day emissions, use annual emissions instead. NOTE: This setting affects the Smkmerge results only when hourly emissions are not merged. To use hourly average-day emissions in Smkmerge , this variable must be set to Y for the Temporal program, so that average-day emissions will be used in creating the hourly emissions.'
  SMK_EF_MODEL:
    default: blank
    description: 'Name of the emission factor model to use. NOTE: User must set it to MOVES when processing activity inventory data (i.e., VMT, VPOP and SPEED).'
  SMK_MAXERROR:
    default: '100'
    description: Defines the maximum number of ERROR statements to be displayed by SMOKE.
  SMK_MAXWARNING:
    default: '100'
    description: Defines the maximum number of WARNING statements to be displayed by SMOKE.
  SMK_SOURCE:
    default: blank
    description: 'Defines the type of sources to be processed. Valid values are A: Area processing B: Biogenic processing M: Mobile processing P: Point processing.'
  UNIFORM_TPROF_YN:
    default: N
    description: 'Defines whether to use uniform temporal profiles for all sources. Y: Use uniform temporal profiles N: Use temporal profiles file and temporal cross-reference file'
  USE_EXP_GEO_CODES:
    default: N
    description: If set to Y then use GEOCODE_LEVEL[1-4] files instead of the COSTCY file to define expanded geographical detail such as country-level(GEOCODE_LEVEL1), country/state-level (GEOCODE_LEVEL2), country/state/county-level (GEOCODE_LEVEL3) or country/state/county/tribal-level (GEOCODE_LEVEL4).
  ZONE4WM:
    default: Y
    description: "Defines whether Temporal applies weekly and monthly temporal profiles using time zones. If SMOKE does not apply the profiles using the sources\u2019 time zones, then all sources change from one day to the next or one month to the next at the same hour. This is what other emission processing systems have typically done, and it is a minor distinction in most cases. Y: Use time zones N: Do not use time zones"
tmpbeis3:
  B3GRD:
    default: ''
    description: (File) Gridded, normalized biogenic emissions, output from Normbeis3
  B3GTS_L:
    default: ''
    description: '(File) Type: I/O API NetCDF - adapted gridded format'
  B3GTS_S:
    default: ''
    description: (File) Gridded, speciated, hourly biogenic emissions, in tons/hour
  BEIS_VERSION:
    default: '3.60'
    description: 'Specifies which version of BEIS3 to use. 3.60: Use BEIS version 3.60. 3.14: Use BEIS version 3.14.'
  BG_CLOUD_TYPE:
    default: '1'
    description: 'Specifies which meteorological data to use. 1: Use RGND or RSD (solar radiation reaching the ground) from MM5 to calculate PAR. No other options are supported at this time.'
  BIOG_SPRO:
    default: BV310
    description: 'Specifies the speciation profile for biogenic emissions from GSPRO. B3V10: Use BEIS version 3.60. BV313: Use BEIS version 3.14.'
  BIOMET_SAME:
    default: N
    description: Defines whether the radiation/cloud data are in the same file as the temperature data ( MET_FILE1 ) or in a different file ( MET_FILE2 ).
  BIOSEASON:
    default: ''
    description: 'Y: Use gridded seasonal switch file'
  BIOSW_YN:
    default: Y
    description: 'Indicates whether to use a gridded seasonal switch file. Y: Use gridded seasonal switch file BIOSEASON N: Use environment variable SUMMER_YN to determine season'
  GRID_CRO_2D:
    default: ''
    description: (File) Meteorology file containing latitude and longitude coordinates for each grid cell
  GSPRO:
    default: ''
    description: "(File) The speciation profile file, GSPRO , contains the factors that are used to separate aggregated inventory pollutant emissions totals into emissions of model species required by the AQM. In traditional ozone air quality modeling, this file contained split factors only for VOC. In SMOKE, all inventory pollutants need to be represented in this file, even if it is only to indicate that a pollutant is not split into any model species (e.g., CO emissions would have a \u201C split factor \u201D of 1.0). The format of the GSPRO file is shown in Table 6.41, \u201CFormat for GSPRO \u201D . For support of combining criteria and toxic VOC using the NONHAPVOC calculation feature of SMOKE, the GSPRO file (starting in version 2.3 of SMOKE) includes a special header that defines the meaning of NONHAPVOC. This is the new #NHAP header, described below. This header keyword will be treated as a comment line by previous versions of SMOKE. The header lines define NONHAPVOC (and/or NONHAPTOG)\
      \ by listing all of the VOC compounds that were assumed to be removed from VOC (or TOG) when the speciation profile factors for NONHAPVOC (or NONHAPTOG) were calculated. When using this file, Spcmat compares this list with the list from the Inventory Table (\"VOC or TOG Component\" field = V or T and \"Explicit in Mechanism = \"N\"). This new header is included in this file so that the file is self-describing with respect to the definition of NONHAPVOC and NONHAPTOG. The format supports header lines (using a # symbol in position 1 of any line) in any part of the file."
  INITIAL_RUN:
    default: N
    description: "Indicates whether a particular day is the first day in a sequence of simulations. Y: Use for the first day in a sequence of simulations. Use if the SOILINP file does not yet exist (i.e., the soil NO calculations will not depend on the previous day\u2019s rainfall). N: Use for subsequent days in a sequence of simulations. Use if the SOILINP file exists. Note that BEIS3 will create a SOILINP file for days subsequent to the first day in a sequence of simulations."
  ISLTYP_VAR:
    default: SLTYP
    description: Specifies the soil type variable name used if PX_VERSION = Y.
  LAI_VAR:
    default: LAI
    description: Specifies the variable name for the leaf area index from the me model (e.g. WRF) used for the leaf temperature algorithm (Only for BEIS version 3.60)
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Tmpbeis3
  MET_FILE1:
    default: ''
    description: 'Y: Use if the Pleim-Xiu land surface model was used in the MM5 simulations. Indicates that contains soil temperature, soil moisture and soil type fields that can be used, along with rainfall data, for NO soil emission calculations in Tmpbeis3 .'
  MET_FILE2:
    default: ''
    description: (File) Meteorology file containing radiation/cloud data if not in MET_FILE1
  OUTZONE:
    default: '0'
    description: "Indicates offset from Greenwich Mean Time (GMT) for episode start date and time. OUTZONE should be set to the standard time for the time zone of interest; SMOKE will adjust to Daylight Saving time for episodes that are during periods and in regions where Daylight Saving time applies. Table 2.9, \u201CExample OUTZONE settings and their associated time zones\u201D provides allowed values for OUTZONE . The CMAQ model expects OUTZONE to be 0, while other models such as UAM-IV, UAM-V and CAM X often use time zone 5. All models expect that the emissions and the meteorology data provided to the model will have a consistent time zone. SMOKE expects that the meteorology data will be in GMT. Note that SMOKE expects OUTZONE to be set as a positive number for time zones in the Western Hemisphere, although standard notation would list these as negative values. For example, Eastern Standard Time is -5:00 hours from GMT, but OUTZONE for EST in SMOKE is 5."
  OUT_UNITS:
    default: '1'
    description: 'Specifies units for the output variables. 1: moles per hour. 2: moles per second.'
  PRES_VAR:
    default: PRSFC
    description: Specifies the variable name for surface pressure data to extract from MET_FILE1 .
  PX_VERSION:
    default: N
    description: 'Indicates whether the Pleim-Xiu land surface model was used in the MM5 simulations. Y: Use if the Pleim-Xiu land surface model was used in the MM5 simulations. Indicates that MET_FILE1 contains soil temperature, soil moisture and soil type fields that can be used, along with rainfall data, for NO soil emission calculations in Tmpbeis3 . N: Use if the Pleim-Xiu land surface model was not used in the MM5 simulations. Indicates that Tmpbeis3 will calculate NO soil emissions using only rainfall data.'
  Q2_VAR:
    default: Q2
    description: Specifies the variable name for the two meter water vapor mixing ratio (kg/kg) used for the leaf temperature algorithm (Only for BEIS version 3.60).
  RADYNI_VAR:
    default: RADYNI
    description: Specifies the variable name for the aerodynamic resistance variable (s/m) used for the leaf temperature algorithm (Only for BEIS version 3.60).
  RAD_VAR:
    default: RGRND
    description: Specifies the variable name for radiation/cloud data to extract from either MET_FILE1 or optional MET_FILE2 .
  RC_VAR:
    default: RC
    description: Specifies the convective rainfall variable name used in MET_FILE1 .
  RGRND_VAR:
    default: RGRND
    description: Specifies the variable name for the solar radiation reaching the ground used for the leaf temperature algorithm (Only for BEIS version 3.60).
  RN_VAR:
    default: RN
    description: Specifies the non-convective rainfall variable name used in MET_FILE1 .
  RSTOMI_VAR:
    default: RSTOMI
    description: Specifies the variable name for the inverse of the stomatal resistance variable (m/s) used for the leaf temperature algorithm (Only for BEIS version 3.60).
  SOILINP:
    default: ''
    description: "Y: Use for the first day in a sequence of simulations. Use if the file does not yet exist (i.e., the soil NO calculations will not depend on the previous day\u2019s rainfall)."
  SOILM_VAR:
    default: SOIM1
    description: Specifies the soil moisture variable name used if PX_VERSION = Y .
  SOILOUT:
    default: ''
    description: (File) Gridded soil restart file
  SOILT_VAR:
    default: SOIT1
    description: Specifies the soil temperature variable name used if PX_VERSION = Y .
  SUMMER_YN:
    default: ''
    description: 'N: Use environment variable to determine season'
  TEMPG_VAR:
    default: TEMPG
    description: Specifies the skin temperature at the ground level (K) used for the leaf temperature algorithm (Only for BEIS version 3.60).
  TMPR_VAR:
    default: TA
    description: Specifies the variable name for temperature to extract from MET_FILE1 .
  USTAR_VAR:
    default: USTAR
    description: Specifies the variable name for the surface friction velocity (m/s) used for the leaf temperature algorithm (Only for BEIS version 3.60).
