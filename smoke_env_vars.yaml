  OUTZONE:
    default: '0'
    description: "Indicates offset from Greenwich Mean Time (GMT) for episode start date and time. OUTZONE should be set to the standard time for the time zone of interest; SMOKE will adjust to Daylight Saving time for episodes that are during periods and in regions where Daylight Saving time applies. Table 2.9, \u201CExample OUTZONE settings and their associated time zones\u201D provides allowed values for OUTZONE . The CMAQ model expects OUTZONE to be 0, while other models such as UAM-IV, UAM-V and CAM X often use time zone 5. All models expect that the emissions and the meteorology data provided to the model will have a consistent time zone. SMOKE expects that the meteorology data will be in GMT. Note that SMOKE expects OUTZONE to be set as a positive number for time zones in the Western Hemisphere, although standard notation would list these as negative values. For example, Eastern Standard Time is -5:00 hours from GMT, but OUTZONE for EST in SMOKE is 5."
  OUT_UNITS:
    default: '1'
    description: 'Specifies units for the output variables. 1: moles per hour. 2: moles per second.'
  PRES_VAR:
    default: PRSFC
    description: Specifies the variable name for surface pressure data to extract from MET_FILE1 .
  PX_VERSION:
    default: N
    description: 'Indicates whether the Pleim-Xiu land surface model was used in the MM5 simulations. Y: Use if the Pleim-Xiu land surface model was used in the MM5 simulations. Indicates that MET_FILE1 contains soil temperature, soil moisture and soil type fields that can be used, along with rainfall data, for NO soil emission calculations in Tmpbeis4 . N: Use if the Pleim-Xiu land surface model was not used in the MM5 simulations. Indicates that Tmpbeis4 will calculate NO soil emissions using only rainfall data.'
  Q2_VAR:
    default: Q2
    description: Specifies the variable name for the two meter water vapor mixing ratio (kg/kg) used for the leaf temperature algorithm.
  RADYNI_VAR:
    default: RADYNI
    description: Specifies the variable name for the aerodynamic resistance variable (s/m) used for the leaf temperature algorithm.
  RAD_VAR:
    default: RGRND
    description: Specifies the variable name for radiation/cloud data to extract from either MET_FILE1 or optional MET_FILE2 .
  RC_VAR:
    default: RC
    description: Specifies the convective rainfall variable name used in MET_FILE1 .
  RGRND_VAR:
    default: RGRND
    description: Specifies the variable name for the solar radiation reaching the ground used for the leaf temperature algorithm.
  RN_VAR:
    default: RN
    description: Specifies the non-convective rainfall variable name used in MET_FILE1 .
  RSTOMI_VAR:
    default: RSTOMI
    description: Specifies the variable name for the inverse of the stomatal resistance variable (m/s) used for the leaf temperature algorithm.
  SOILINP:
    default: ''
    description: "Y: Use for the first day in a sequence of simulations. Use if the file does not yet exist (i.e., the soil NO calculations will not depend on the previous day\u2019s rainfall)."
  SOILM_VAR:
    default: SOIM1
    description: Specifies the soil moisture variable name used if PX_VERSION = Y .
  SOILOUT:
    default: ''
    description: (File) Gridded soil restart file
  SOILT2_VAR:
    default: SOIT2
    description: Specifies the soil temperature for top meter variable name used if PX_VERSION = Y .
  SOILT_VAR:
    default: SOIT1
    description: Specifies the soil temperature variable name used if PX_VERSION = Y .
  SUMMER_YN:
    default: ''
    description: 'N: Use environment variable to determine season or see COMPUTE_SEASON_FUNCTION environment variable.'
  TEMPG_VAR:
    default: TEMPG
    description: Specifies the skin temperature at the ground level (K) used for the leaf temperature algorithm.
  TMPR_VAR:
    default: TA
    description: Specifies the variable name for temperature to extract from MET_FILE1 .
  USE_WRF_LAI:
    default: Y
    description: 'Y: Use gridded, hourly, Leaf Area Index (LAI) values from WRF-MCIP (e.g. MET_FILE1 ) for all biogenic emissions calculations in Tmpbeis4 . N: Use summer and winter LAIs computed in Normbeis4 in the BEIS_NORM_EMIS file.'
  USE_WRF_WSAT:
    default: Y
    description: 'Indicates whether to use soil saturation variable in the MCIP input file, MET_FILE1 . Y: Use the soil saturation variable in calculating emissions. N: Do not use the soil saturation variable or the soil saturation variable is not available for use.'
  USTAR_VAR:
    default: USTAR
    description: Specifies the variable name for the surface friction velocity (m/s) used for the leaf temperature algorithm.
  WSAT_VAR:
    default: WSAT_PX
    description: Specifies the soil saturation variable name used if PX_VERSION = Y .
