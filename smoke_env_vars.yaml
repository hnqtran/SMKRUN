  SMK_GRWORLOUT_YN:
    default: N
    description: 'Indicates if an ORL-formatted grown and/or controlled inventory should be output. Currently only ORL nonpoint ond point inventory formats are supported. SMK_GRWORLOUT_YN and SMK_GRWIDAOUT_YN cannot be both set to Y in the same run. In SMOKE version 2.3, the Grwinven ORL output format was changed to use a more compact structure (eliminated spaces), uses commas, and includes semi-colons around all text fields. These changes make these files much smaller and easier to import to other software, but unfortunately harder to read in a text editor. Y: Output inventory in ORL format N: Do not output inventory in ORL format'
  SMK_GRWSMKOUT_YN:
