  SRGDESC:
    default: ''
    description: "(File) The Surrogate Description file is used to designate the regional location of the surrogate, the surrogate code number, a brief description of the code number and the Area and Mobile spatial surrogate file in which surrogate profile can be found. This file is located in SRGPRO_PATH . See Figure 4.4, \u201C Grdmat input and output files\u201D . The format of the SRGDESC file is shown in Table 6.37, \u201CFormat for SRGDESC \u201D ."
  SRGPRO_PATH:
    default: N
    description: Defines the location of spatial surrogate files.
  SRG_LIST:
    default: N
    description: 'Specifies the code(s) of the spatial surrogate(s) to be used in selecting the grid cells for the county (example: setenv SRG_LIST ''100,230'').'
  STDATE:
    default: '0'
    description: 'This environment variable sets the overall episode start date: Julian format (YYYYDDD) for Movesmrg .'
  SURROGATE FILE(S):
    default: ''
    description: (File) Surrogate file(s) selected by SRG_LIST
  TEMP_BUFFER_BIN:
    default: '0.0'
    description: "Defines the temperature buffer value (\xB0F). This value will allow Met4moves to expand the min/max temperature range for MOVES RPP processing. If TEMP_BUFFER_BIN is set to 10.0, the original max temperature which is 90.0\xB0F will be treated as 100.0\xB0F, and minimum temperaure (=30\xB0F) will be treated as 20.0\xB0F internally in Met4moves ."
  TVARNAME:
    default: TEMP2
    description: Specifies the variable name for the temperature to estimate the emission factor from the MOVES emission factors lookup tables.
  USE_EXP_GEO_CODES:
    default: N
    description: If set to Y then use GEOCODE_LEVEL[1-4] files instead of the COSTCY file to define expanded geographical detail such as country-level(GEOCODE_LEVEL1), country/state-level (GEOCODE_LEVEL2), country/state/county-level (GEOCODE_LEVEL3) or country/state/county/tribal-level (GEOCODE_LEVEL4).
movesmrg:
  APPLY_NOX_HUMIDITY_ADJ:
    default: N
    description: 'Allows Movesmrg to apply NOx humidity correction to gridded hourly NOx emissions for RPD, RPS, RPH, and RPHO runs. If there is a header "HUMIDITY_ADJUSTED_NOX Y" listed in the MOVES lookup tables, it means that NOx emissions in those MOVES lookup tables are already adjusted and this flag will be overwritten to N. No NOx humidity correction will be applied. Y: Apply NOx humidity correction to non-NOx humidity correction applied MOVES lookup tables from RPD, RPH, RPS, and RPHO runs. N: Do not apply NOx humidity correction.'
  CFPRO:
    default: ''
    description: "(File) The CFPRO file is used to allow the user to apply factors to Movesmrg to control hourly emission rates from all MOVES lookup tables (i.e., RatePerDistance, RatePerVehicle, RatePerHour, and RatePerProfile). Its format is shown in Table 6.62, \u201CFormat for CFPRO \u201D . A many-step hierarchy is used in applying the control factor cross-referencing. SMOKE preferentially matches each source to the most specific match in the file. The maximum field width in SMOKE and its input files for SCC is 20 characters as of SMOKE v4.0. The 8 or 10 digit SCC are still supported, but if the SCC is greater than 10 digits the SCC hierarchial approach will not be supported. Country/state/county code, 10-digit SCC, month, and pollutant Country/state/county code, 10-digit SCC, and month Country/state/county code, 10-digit SCC, and pollutant Country/state/county code, and 10-digit SCC Country/state code, 10-digit SCC, month, and pollutant Country/state code, 10-digit SCC, and month\
      \ Country/state code, 10-digit SCC, and pollutant Country/state code, and 10-digit SCC 10-digit SCC, month, and pollutant 10-digit SCC, and month 10-digit SCC, and pollutant 10-digit SCC Country/state/county code, month, and pollutant Country/state/county code, and month Country/state/county code, and pollutant Country/state/county code Country/state code, month, and pollutant Country/statecode, and month Country/state code, and pollutant Country/state code Ultimate default (no pollutant, no month, country/state/county code = 0, SCC = 0)"
  COSTCY:
    default: ''
    description: "(File) The COSTCY file is used to assign numeric codes to the various countries, states, and counties to be modeled; the file also provides information concerning default time zones and Daylight Savings observance. A header line can be used in this file to indicate that population data are contained in the file as the last column on each line of the /COUNTY/ packet. The header line and additional population column are optional. If it is present in the file, it must be on the first line of the file and use the following syntax: #POPULATION <year> where <year> is a 4-digit year. The country, state, and county codes in each section of this file must be sorted in increasing order. If they are not, the programs reading this file will give an error. The format of the COSTCY file is shown in Table 6.85, \u201CFormat for COSTCY \u201D ."
  GEOCODE_LEVEL1:
    default: ''
    description: "(File) The GEOCODE_LEVEL1 input file contains a 3 character code used to specify the Country-level Geographical Code. The COSTCY file will not be used if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each country in the gridded inventory data then they would create a GEOCODE_LEVEL1 file. The GEOCODE_LEVEL1 file is comma delimited as shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL1 file is shown in Table 6.87, \u201CFile Format for GEOCODE_LEVEL1 \u201D ."
  GEOCODE_LEVEL2:
    default: ''
    description: "(File) The GEOCODE_LEVEL2 input file contains up to 6 character code to specify the Country/State-level Geographical Codes which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. If the user would like to use chemical and temporal profiles that are specified for each state level region for each country in the gridded inventory data then they would create a GEOCODE_LEVEL2 file. The GEOCODE_LEVEL2 file is comma delimited as shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL2 file is shown in Table 6.88, \u201CFile Format for GEOCODE_LEVEL2 \u201D ."
  GEOCODE_LEVEL3:
    default: ''
    description: "(File) The GEOCODE_LEVEL3 input file contains up to 9 character code to specify the Country/State-level/County-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL3 file is comma delimited as shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL3 file is shown in Table 6.89, \u201CFile Format for GEOCODE_LEVEL3 \u201D ."
  GEOCODE_LEVEL4:
    default: ''
    description: "(File) The GEOCODE_LEVEL4 input file contains a 12 character code to specify the Country/State/County/Tribal-level Geographical Code which will replace the COSTCY file if the environment variable USE_EXP_GEO_CODES is set to Y. The GEOCODE_LEVEL4 file is comma delimited as shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D . This file should not include any descriptions that have the pipe symbol (|), single quotes, or double quotes. It is okay to include dashes, slashes, semicolons, colons, commas, and periods in descriptions. The format of the GEOCODE_LEVEL4 file is shown in Table 6.90, \u201CFile Format for GEOCODE_LEVEL4 \u201D ."
  GRIDDESC:
    default: ''
    description: (File) The GRIDDESC file is used to provide grid and projection information to SMOKE and can contain data for many different projections and many different grids. The format of the GRIDDESC file is available in the I/O API documentation at http://www.baronams.com/products/ioapi/GRIDDESC.html .
  INVTABLE:
    default: ''
    description: "(File) The INVTABLE file replaces the SIPOLS and ACTVNAMS files previously used by SMOKE. Smkinven uses the inventory table to select the inventory pollutants that will be output by Smkinven . The valid pollutants are again checked at the end of SMOKE processing by Smkmerge , to ensure that the program knows about all of the pollutants and also to set the order of the output variables (output species are sorted by the order of the pollutants in the inventory table and for multiple species per pollutant, by alphabetical order). You can use the INVTABLE to drop inventory pollutants in Smkinven without having to modify the inventory files, simply by modifying INVTABLE . The units used in the SMOKE intermediate files are listed in this file. The SMOKE programs Spcmat , and Movesmrg use this file to determine which pollutants should be included in the NONHAPVOC or NONHAPTOG calculation. The inventory table also provides a way to assign the SPECIATE4 species ID to any pollutant\
      \ that is a Hazardous Air Pollutant (HAP) VOC. This assignment is not used directly by SMOKE, but rather is used by the Speciation Tool when creating VOC speciation profiles. This is used only when creating speciation profiles to support SMOKE runs that will combine criteria VOC and HAP VOC emissions, using the NHAPEXCLUDE file in the Smkinven program. More specifically, this can be done for the purpose of using VOC HAP emissions to augment VOC speciation profiles. Since the Inventory Table provides information to the Speciation Tool, this field is not used by SMOKE, but is included for continued integration of SMOKE inputs with the Speciation Tool. As described in the Smkinven documentation in Chapter 6, Smkinven in some cases will create \"no-integrate\" (NOI) HAP pollutant emissions from the inventory data by renaming the pollutant with a \"_NOI\" suffix applied to the end of the Inventory Data Name from the Inventory Table for such pollutants. Similarly, Smkinven will automatically\
      \ add all possibly needed \"_NOI\" pollutant names to the internal master list of valid pollutant names. This list would otherwise be limited to the contents of the INVTABLE file entries where the Keep column contains an \"Y\". Smkinven inserts these names in the master list such that the \"_NOI\" version of the pollutant name appears in the list just after the polutant on which the name is based. The inserted entries that include \"_NOI\" are made when the following values are included for the pollutant in the INVTABLE file. A \"Y\" appears in the \"Keep\" field A \"V\" or \"T\" appears in the \"VOC or TOG component\" field A \"Y\" appears in the \"Model species\" field Something other than \"Y\" appears in the \"Explicit in mechanism\" field (e.g., \"N\" or blank) It is possible for a user to choose two pollutants that result in double counting the emissions from the inventory. For example, you may want to model both benzo(a)pyrene and 7-PAH which, would result in the emissions associated\
      \ with CAS number 205992 (for benzo(a)pyrene) to be duplicated. The user is responsible for the choices made and the resulting changes in inventory mass. The format of the INVTABLE is shown in Table 6.91, \u201CFormat for INVTABLE \u201D ."
  LOGFILE:
    default: ''
    description: (File) Logfile
  MAX_TEMP_EMIS_TABLE:
    default: '120.0'
    description: Define the highest temperature for precomputed emissions table output file when OUTPUT_EMIS_TABLE_YN is set to Y.
  MCXREF:
    default: ''
    description: "(File) The MCXREF file is a list-directed file used to assign representative counties to inventory counties. Its format is shown in Table 6.63, \u201CFormat for MCXREF \u201D ."
  MEMORY_OPTIMIZE_YN:
    default: Y
    description: 'Allows Movesmrg to use less RAM memory. However, it will increase computational time of RPD_MODE and RPV_MODE runs. Y: Runs Movesmrg in memory optimization mode. N: Runs Movesmrg faster mode using high capacity of RAM memory.'
  MEPROC:
    default: ''
    description: "(File) The MEPROC file, used by Spcmat lists the pollutants that will be generated by MOVES for modeling on-roadway and off-network mobile sources. The available emission processes are listed in Section 2.7.4.9, \u201C MOVES Emission Processes by Emission Rate Tables\u201D . The format of the MEPROC file is shown in Table 6.64, \u201CFormat for MEPROC \u201D ."
  METLIST:
    default: ''
    description: "(File) The METLIST file is used to provide the file names of available meteorology files to the Met4moves programs. Met4moves runs once for the entire modeling episode, and therefore needs all of the files at one time. The meteorology files provided to Met4moves must cover the desired episode and contain the requested variables. In the example SMOKE scripts, this file is generated automatically. The format of this file is shown in Table 6.55, \u201CFormat for METLIST \u201D ."
  METMOVES:
    default: ''
    description: (File) Meteorology file from Met4moves
  MFMREF:
    default: ''
    description: "(File) The MFMREF file specifies reference fuel months to assign to calendar months being simulated for each representative county. The file specifies the representative month where the fuel formulation mix is representative for other months. The file serves the purpose of grouping months of the year by fuel parameters. The format of the MFMREF file shown in Table 6.65, \u201CFormat for MFMREF \u201D ."
  MGMAT:
    default: ''
    description: (File) Gridding matrix from Grdmat
  MGTS_L:
    default: ''
    description: (File) Model Ready Emissions File
  MGTS_S:
    default: ''
    description: (File) Model Ready Emissions File
  MIN_TEMP_EMIS_TABLE:
    default: '0.0'
    description: Define the lowest temperature for precomputed emissions table output file when OUTPUT_EMIS_TABLE_YN is set to Y.
  MOBL:
    default: ''
    description: (File) Inventory file output from Smkinven
  MRCLIST:
    default: ''
    description: "(File) The MRCLIST file is an input file for Movesmrg that contains the list of MOVES-based lookup tables from the MOVES processing script associated with representative county and fuel month. The format of the MRCLIST file is shown in Table 6.66, \u201CFormat for MRCLIST \u201D ."
  MRG_BYDAY:
    default: blank
    description: String code that specifies which source category is to use a by-day approach for the hourly input files. It must be set to "M" for a Movesmrg to create an output file for each day.
  MRG_GRDOUT_UNIT:
    default: units
    description: String code that permits user to change the unit of the gridded output file.
  MRG_GRDOUT_YN:
    default: N
    description: 'Determines whether Movesmrg produces a gridded output file. Y: Read the gridding matrix produced by the Grdmat N: Do not read the gridding matrix.'
  MRG_REPCNY_YN:
    default: N
    description: 'Determines whether Movesmrg produces a report of emission totals by county Y: Produce the report by Movesmrg N: Do not produce the report'
  MRG_REPSCC_YN:
    default: N
    description: 'Determines whether Movesmrg produces a report of emission totals by SCC Y: Produce the report by Movesmrg N: Do not produce the report'
  MRG_REPSRC_YN:
    default: N
    description: 'Determines whether Movesmrg produces a report of emission totals by source. Y: Produce the report by Movesmrg . It will reset MRG_REPCNY_YN and MRG_REPSCC_YN to N to avoid to outputing duplicate information into the report. N: Do not produce the report'
  MRG_REPSTA_YN:
    default: N
    description: 'Determines whether Movesmrg produces a report of emission totals by state Y: Produce the report by Movesmrg N: Do not produce the report'
  MRG_SPCOUT_YN:
    default: N
    description: 'Determines whether Movesmrg produces a speciated output file. Y: Read the gridding matrix produced by the Spcmat N: Do not read the gridding matrix.'
  MRG_TOTOUT_UNIT:
    default: units
    description: String code that permits user to change the unit of the state/county total report file.
  MSMAT_L:
    default: ''
    description: (File) Speciation matrix from Spcmat
  MSMAT_S:
    default: ''
    description: (File) Speciation matrix from Spcmat
  MTMP_INV:
    default: ''
    description: (File) Hourly emissions by source
  MTMP_OUTPUT_YN:
    default: N
    description: "Defines whether Temporal outputs the Temporal intermediate output file from Section 7.15, \u201C Temporal \u201D for Smkreport to create hourly emissions summary report based on hourly gridded emissions estimated by Movesmrg . Y: Output Temporal intermediate output file N: Do not output Temporal intermediate output file"
  MTMP_{DAY}:
    default: ''
    description: (File) Daily hour VMT files from Temporal
  ONI_MODE:
    default: N
    description: 'Determines whether Movesmrg processes off-network idling emissions for RPHO sector. Y: Process off-network idling emissions N: Do not process off-network idling emissions'
  OUTPUT_EMIS_TABLE_YN:
    default: N
    description: "Determines whether Movesmrg outputs temperature-bin precomputed gridded hourly emissions tables or not (Not applicable for RPP mode). Find the details on how the temperature-bin-specific pregridded hourly emissions approach can work for your modeling run \u201C CMAQ-MetEmis Dynamic Coupler Development \u201D Y: Output temperature-bin precomputed gridded hourly emissions table. N: Do not output temperature-bin precomputed gridded hourly emissions table"
  REPMGTS_L:
    default: ''
    description: (File) Report File
  REPMGTS_S:
    default: ''
    description: (File) Report File
  RPD_MODE:
    default: N
    description: 'Determines whether Movesmrg processes rate-per-distance emissions. Y: Process rate-per-distance emissions N: Do not process rate-per-distance emissions'
  RPH_MODE:
    default: N
    description: 'Determines whether Movesmrg processes rate-per-hour emissions. Y: Process rate-per-hour emissions N: Do not process rate-per-hour emissions'
  RPP_MODE:
    default: N
    description: 'Determines whether Movesmrg processes rate-per-profile emissions. Y: Process rate-per-profile emissions N: Do not process rate-per-profile emissions'
  RPS_MODE:
    default: N
    description: 'Determines whether Movesmrg processes rate-per-start emissions. Y: Process rate-per-start emissions N: Do not process rate-per-start emissions'
  RPV_MODE:
    default: N
    description: 'Determines whether Movesmrg processes rate-per-vehicle and rate-per-start emissions. Y: Process rate-per-vehicle emissions N: Do not process rate-per-vehicle emissions'
  SGINLNTS_L:
    default: ''
    description: (File) Emissions by source group, formatted as CMAQ in-line emissions data, produced if SMK_SRCGROUP_OUTPUT_YN is set to Y
  SGINLNTS_S:
    default: ''
    description: (File) Emissions by source group, formatted as CMAQ in-line emissions data, produced if SMK_SRCGROUP_OUTPUT_YN is set to Y
  SMK_MVSPATH:
    default: blank
    description: Defines the location of MOVES emission factors lookup tables.
  SMK_SOURCE:
    default: blank
    description: Sets the types of source category. It must be set to "M" for Movesmrg .
  SMK_SRCGROUP_OUTPUT_YN:
    default: N
    description: 'Indicates if source apportionment emissions should be output Y: Group sources and output source apportionment files N: Do not perform any source apportionment processing'
  SMK_SUB_SECTOR_OUTPUT_YN:
    default: N
    description: 'Indicates if sub-sector source group emissions should be output Y: Group sources and output sub-sector source group files N: Do not perform sub-sector source group processing'
  SOURCE_GROUPS:
    default: ''
    description: (File) The SOURCE_GROUPS file is used to define groups of sources when processing emissions for source apportionment. Movesmrg and Smkmerge read this file when SMK_SRCGROUP_OUTPUT_YN is set to Y. When reading the SOURCE_GROUPS file, SMOKE will skip lines with data that doesn't apply to the current source category. Lines that contain a plant ID or point ID will be skipped when processing area, biogenic, or mobile sources. Lines containing an SCC will be skipped when processing biogenic sources. If SMOKE encounters lines with duplicate grouping information (i.e. FIPS, SCC, point source characteristics), an error will be printed to the log and the program will quit. Multiple grouping criteria can be assigned to the same source group ID by using additional lines. In the example below, all sources with SCCs 2102001000, 2102002000, and 2102004000 will be assigned to source group 1.
  SPDIST:
    default: ''
    description: "(File) The SPDIST file is used to provide weekend/weekday and hour-specific average 16-speed bins distribution profile data to Movesmrg to estimate hourly emission rates from RatePerDistance (RPD) lookup table. It's format is shown in Table 6.67, \u201CFormat for SPDIST \u201D ."
  SPDPRO:
    default: ''
    description: "(File) The SPDPRO file is used to provide weekend/weekday hourly speed profile data to Movesmrg to estimate hourly emission rates from RatePerDistance lookup table. It's format is shown in Table 6.68, \u201CFormat for SPDPRO \u201D ."
  SRCGROUPS_OUT:
    default: ''
    description: (File) Source group information, produced if SMK_SRCGROUP_OUTPUT_YN is set to Y
  SRCGRP_REPORT:
    default: ''
    description: (File) Source group report file, produced if SMK_SRCGROUP_OUTPUT_YN or SMK_SUB_SECTOR_OUTPUT_YN is set to Y
  SUBOUT##GTS_L:
    default: ''
    description: (File) Emissions by sub-sector source group ID (##) produced if SMK_SUB_SECTOR_OUTPUT_YN is set to Y
  SUBOUT##GTS_S:
    default: ''
    description: (File) Emissions by sub-sector source group ID (##) produced if SMK_SUB_SECTOR_OUTPUT_YN is set to Y
  TEMP_BUFFER_BIN:
    default: '0.0'
    description: "Defines the temperature buffer value (\xB0F). This value allows Movesmrg to cover the outside of min/max temperature range in SMOKE_OUTFILE from Met4moves for Movesmrg RPP processing. If TEMP_BUFFER_BIN is set to 10.0, the original max temperature which is 90.0\xB0F will be treated as 100.0\xB0F, and minimum temperaure (=30\xB0F) will be treated as 20.0\xB0F internally in Movesmrg . Emission rates for those temperatures outside of original temperature range will share the ones from original max/min temperatures."
  TEMP_INCREMENT_EMIS_TABLE:
    default: '5.0'
    description: Define the temperature bin increment for precomputed emissions table output file when OUTPUT_EMIS_TABLE_YN is set to Y.
  TVARNAME:
    default: TEMP2
    description: Name of temperature variable to read from the meteorology files for Movesmrg .
  USE_AVG_SPD_DIST:
    default: N
    description: 'Allows the user to apply 16-speed bin average speed distribution profiles by region, SCC, day of week, and hour of day. Y: Apply 16-speed bin average speed distribution profiles. N: Do not apply average speed distribution profiles.'
  USE_CONTROL_FACTORS:
    default: N
    description: 'Allows the user to apply control factor by region, SCC, pollutant, and month. Y: Apply control factors to MOVES emission rates from MOVES lookup tables. N: Do not apply control factor.'
  USE_EXP_CONTROL_FAC_YN:
    default: N
    description: 'Allows the user to optionally apply pollutant/species-specific explict control factor by region, SCC, and month when USE_CONTROL_FACTORS is set to Y. Y: Apply pollutant/species-specific explicit control factors to MOVES emission rates from MOVES lookup tables. N: Do not apply control factor.'
  USE_EXP_GEO_CODES:
    default: N
    description: If set to Y then use GEOCODE_LEVEL[1-4] files instead of the COSTCY file to define expanded geographical detail such as country-level(GEOCODE_LEVEL1), country/state-level (GEOCODE_LEVEL2), country/state/county-level (GEOCODE_LEVEL3) or country/state/county/tribal-level (GEOCODE_LEVEL4).
  USE_HOURLY_SPEEDS:
    default: N
    description: 'Determine whether processes weekday/weekend hourly speed profiles or not. Y: Process weekday/weekend hourly speed profiles N: Do not process hourly speed profiles'
  USE_REF_CONTROL_FAC_YN:
    default: N
    description: 'Allows the user to optionally apply reference-county-level control factor by SCC, and month when USE_CONTROL_FACTORS is set to Y. Y: Apply reference-county-level control factors to MOVES emission rates from MOVES lookup tables. N: Do not apply control factor.'
  USE_SPCMAT_SPC_YN:
    default: N
    description: 'Determine whether estimate air quality model species using chemical speciation profiles or not. Y: Estimate model species emissions using GSPRO input file N: Estimate model species emissions directly from MOVES emission rates lookup tables'
mrgelev:
  FILELIST:
    default: ''
    description: "(File) The FILELIST file is used to provide a list of logical file names to the Mrggrid program. This list should contain the logical file names for all 2- or 3-D files to be merged in a given run. It is a very simple file, and has no limit to the number of files listed. Note that unlike most list files used in SMOKE, FILELIST requires a list of logical file names, not the actual file name. The format of the FILELIST file is shown in Table 6.53, \u201CFormat for FILELIST \u201D ."
  G_STDATE:
    default: ''
    description: 'Y: Allow data from different dates to be merged together Mrgelev will use the environment variables , G_STTIME , G_RUNLEN , and G_TSTEP to set the start date, start time, length, and time step of the output file. All input files must have the same starting time as G_STTIME , the same time step as G_TSTEP , and must contain more than G_RUNLEN steps of data. For each input file, if it contains data to cover the actual episode requested by G_STDATE , G_STTIME , and G_RUNLEN , then the data for the actual episode will be used; otherwise, data starting at the first time step of the file will be used.'
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Mrgelev
  MRG_DIFF_DAYS:
    default: N
    description: 'This environment variable allows Mrgelev to merge files with data from different days. Y: Allow data from different dates to be merged together Mrgelev will use the environment variables G_STDATE , G_STTIME , G_RUNLEN , and G_TSTEP to set the start date, start time, length, and time step of the output file. All input files must have the same starting time as G_STTIME , the same time step as G_TSTEP , and must contain more than G_RUNLEN steps of data. For each input file, if it contains data to cover the actual episode requested by G_STDATE , G_STTIME , and G_RUNLEN , then the data for the actual episode will be used; otherwise, data starting at the first time step of the file will be used. N: Require all merged data to be from the same date Mrgelev will determine the output file time period based on the latest starting input file and the earliest ending input file.'
  OUTFILE:
    default: ''
    description: "(File) Type: I/O API NetCDF - adapted gridded format Summary: Final, model-ready file created from two or more souce categories. See Section 8.6, \u201C Smkmerge \u201D for file format."
  PELVLIST:
    default: ''
    description: (File) List of input PELV files including path and file name; leave environment variable unset if not processing PinG sources
  PTSOURCE:
    default: ''
    description: (File) Merged binary elevated file
  REPMRGELEV:
    default: ''
    description: (File) Report file summarizing input and output emissions for QA purposes
mrggrid:
  ADJ_FACS:
    default: ''
    description: (File) File that lists the species name, the logical file name, and the factor to be applied to all grid cells. The species name must be in columns A, the logical file name in column B, and the factor in columns C. SMOKE will ignore the case of the text, treating lower- and uppercase characters as if they were the same. For example, the following ADJ_FACS file sample would multiply NO emissions from the MGTS_L file by 1.3 (30% increase) and multiply PAR from the PGTS_L file by 0.6 (40% decrease). NO, MGTS_L, 1.3 PAR, PGTS_L, 0.6
  FILELIST:
    default: ''
    description: "(File) The FILELIST file is used to provide a list of logical file names to the Mrggrid program. This list should contain the logical file names for all 2- or 3-D files to be merged in a given run. It is a very simple file, and has no limit to the number of files listed. Note that unlike most list files used in SMOKE, FILELIST requires a list of logical file names, not the actual file name. The format of the FILELIST file is shown in Table 6.53, \u201CFormat for FILELIST \u201D ."
  G_STDATE:
    default: ''
    description: 'Y: Allow data from different dates to be merged together Mrggrid will use the environment variables , G_STTIME , G_RUNLEN , and G_TSTEP to set the start date, start time, length, and time step of the output file. All input files must have the same starting time as G_STTIME , the same time step as G_TSTEP , and must contain more than G_RUNLEN steps of data. For each input file, if it contains data to cover the actual episode requested by G_STDATE , G_STTIME , and G_RUNLEN , then the data for the actual episode will be used; otherwise, data starting at the first time step of the file will be used.'
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Mrggrid
  MRG_DIFF_DAYS:
    default: N
    description: 'This environment variable allows Mrggrid to merge files with data from different days. Y: Allow data from different dates to be merged together Mrggrid will use the environment variables G_STDATE , G_STTIME , G_RUNLEN , and G_TSTEP to set the start date, start time, length, and time step of the output file. All input files must have the same starting time as G_STTIME , the same time step as G_TSTEP , and must contain more than G_RUNLEN steps of data. For each input file, if it contains data to cover the actual episode requested by G_STDATE , G_STTIME , and G_RUNLEN , then the data for the actual episode will be used; otherwise, data starting at the first time step of the file will be used. N: Require all merged data to be from the same date Mrggrid will determine the output file time period based on the latest starting input file and the earliest ending input file.'
  OUTFILE:
    default: ''
    description: "(File) Type: I/O API NetCDF - adapted gridded format Summary: Final, model-ready file created from two or more souce categories. See Section 8.6, \u201C Smkmerge \u201D for file format."
  REPMERGE_SUM:
    default: ''
    description: (File) Report file generated when ADJ_FACS is set; the report lists the date, the species name, a daily total of species over all the logical files before and after applying adjustment factors, and the ratio (after/ratio). The report only lists when the ratio is not equal to 1.0
  REPMERGE_TAG:
    default: ''
    description: (File) Report file generated when TAG_SPECIES is set; the report lists the logical files name, species name before and after appending the tag
  REPMERG_ADJ:
    default: ''
    description: (File) Report file generated when ADJ_FACS is set; the report lists the date, the logical file name, the species name, the factor applied, a daily total of species before and after applying adjustment factor, and the ratio (after/ratio). The report only lists when the ratio is not equal to 1.0
  REPMRGGRID:
    default: ''
    description: (File) Report file generated when MRG_DIFF_DAYS is set to Y; the report lists the date and time for each output time step along with the actual date and time of the data read from each file
  TAG_SPECIES:
    default: ''
    description: (File) File that lists the logical file name, the species name, and the tag name to be appended. The logical file name in column B, the species name must be in columns B, and the factor in columns C. SMOKE will ignore the case of the text, treating lower- and uppercase characters as if they were the same. For example, the following TAG_SPECIES file sample would append a tag (t1) to the NO species from the MGTS_L file and append a tag (t3) to the PAR from the PGTS_L file. MGTS_L, NO, t1 PGTS_L, PAR, t3
mrgpt:
  ADJ_FACS:
    default: ''
    description: (File) File that lists the species name, the logical file name, and the factor to be applied to all grid cells. The species name must be in columns A, the logical file name in column B, and the factor in columns C. SMOKE will ignore the case of the text, treating lower- and uppercase characters as if they were the same. For example, the following ADJ_FACS file sample would multiply NO emissions from the PTIPMTS_L_INLN file by 1.3 (30% increase) and multiply PAR from the PTNONIPMTS_L_INLN file by 0.6 (40% decrease). NO, PTNONIPMTS_L_INLN, 1.3 PAR, PTIPMTS_L_INLN, 0.6
  CREATE_REPORT:
