    default: '10'
    description: Defines the temperature increment (in deg. F) for RPP lookup table to create combinations of min/max temperature bins
  PV_TEMP_INCREMENT:
    default: '5'
    description: Defines the temperature increment (in deg. F) for RPV and RPS lookup table to create combinations of min/max temperature bins
  QVARNAME:
    default: QV
    description: Specifies the variable name for the specific humidity to the NOx humidity correction.
