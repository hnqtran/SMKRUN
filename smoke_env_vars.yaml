  FILELIST_STACK:
    default: ''
    description: (File) List of logical file name for ASCII elevated output files; this file cannot contain the full paths and file names. Users should make sure that the logical file names that appear in FILELIST_STACK are defined prior to running Mrgpt .
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Mrgpt
  OUTFILE_INLN:
    default: ''
    description: (File) Merged inline-mode hourly speciated emission file
  OUTFILE_STACK:
    default: ''
