cntlmat:
  ACMAT:
    default: ''
    description: (File) Multiplicative control matrix
  ACREP:
    default: ''
    description: "(File) Type: ASCII - list-directed Summary: This file contains the report for the multiplicative control matrix. It includes the inventory pollutant emissions before and after application of the multiplicative control matrix factors. For area and mobile sources, the report resolution is by state and SCC code. For point sources, the report is by state/county and plant code. The individual factors applied (e.g., /ALLOWABLE/ and /CONTROL/ packet factors) by source are provided in the *CSUMREP file described in Section 8.2.4, \u201C ACSUMREP , MCSUMREP , and PCSUMREP \u201D . The file header and output format are similar to what is output by the Smkreport program (see Section 5.4, \u201CReports Created by Smkreport \u201D . The headers include information about: The source category (area, mobile, or point sources) for the report The base year or projected year of the inventory input file Which control packets were applied Whether the emissions in the report are based on ozone-season\
      \ or annual total emissions The inventory pollutants controlled by the packets The units The columns of the report include: State ID (area and mobile); state/county ID (point) SCC (area and mobile); plant (point) Input emissions in tons/day for each controlled pollutant Output emissions in tons/day for each controlled pollutant"
  ACREP2:
    default: ''
    description: (File) Detailed before-and-after report of application of the /CONTROL/ packet only, which includes any comments appended to the end of the /CONTROL/ packet entries. These comments can describe the controls being applied with each packet row. This report then includes the base and future overall percent reductions on a source-by-source basis, and includes the CONTROL packet line-specific comments.
  ACSUMREP:
    default: ''
    description: '(File) Type: ASCII - list-directed Summary: This file contains all of the control (not growth) information applied to each source, by source. The structure of this file is not amenable for import into a spreadsheet, because all control information applied to each source is listed underneath each source (not on the same line). There is no header in this file.'
  ACTLWARN:
    default: ''
    description: (File) List of warnings
  APMAT:
    default: ''
    description: (File) Growth matrix
  APROJREP:
    default: ''
    description: "(File) Type: ASCII - list-directed Summary: This file contains the report for the /PROJECTION/ packet applied during the Cntlmat run. It includes the growth matrix factors applied to the inventory pollutant emissions. For all sources, the resolution of the report is the source level. For area and mobile sources, this means that the report resolution is by county code and SCC. Mobile sources may additionally have link-detail information if links are included in the inventory. For point sources, the resolution includes the state/county code, plant ID, SCC, and other source identifiers such as segment and point. The file header and output format are somewhat similar to that output by the Smkreport program (see Section 5.4, \u201CReports Created by Smkreport \u201D ), but less so than the *CREP file (see Section 8.2.1, \u201C ACREP , MCREP , and PCREP \u201D ). The headers include information about: The source category (area, mobile, or point sources) for the report The base\
      \ year of the inventory The growth year for the packets being applied The fact that all pollutants receive factors uniformly. The columns of the report include: State ID (area and mobile); state/county ID (point) SCC (area and mobile); plant (point) Growth factor"
  AREA:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  AREACREP:
    default: ''
    description: "(File) Type: ASCII - list-directed Summary: This file contains the report for the reactivity packet applied during the Cntlmat run. It contains the reactivity packet contents applied for any source in the inventory that gets a reactivity control. For all sources, the resolution of the report is the source level, as described for the [A|M|P]PROJREP files in Section 8.2.2, \u201C APROJREP , MPROJREP , and PPROJREP \u201D . The file header and output format are the same as that output by the Smkreport program (see Section 5.4, \u201CReports Created by Smkreport \u201D ). The headers in include information about: The source category (area, mobile, or point sources) for the report The base year of the inventory (or the projected year if applicable) The projected year in the reactivity packet The pollutant name (e.g., ROG) for which the reactivity controls were applied. Whether the emissions in the report are based on average-day or annual total emissions. The column names and\
      \ units The columns in the report include: SMOKE source number State/county code Base-year SCC Base-year emissions New base-year emissions Projection factor Projected-year SCC Projected-year speciation profile Market penetration rate"
  ARMAT_L:
    default: ''
    description: (File) Mole-based reactivity matrix
  ARMAT_S:
    default: ''
    description: (File) Mass-based reactivity matrix
  ARSUP:
    default: ''
    description: (File) Reactivity matrix supplemental file
  COMPARE_REPLACE_CONTROL:
    default: Y
    description: 'Controls the way a replacement control is applied. Y: When set to Y, Cntlmat compares the overall percent reductions (CEFF * RPEN * REFF) from a replacement control in the CONTROL packet against existing percent reductions (either from the base inventory or from a just-applied /MACT/ packet). If the packet''s reduction is more control (greater reduction) than the existing controls, then it is applied. Otherwise, it is not applied. N: When set to N, Cntlmat applies replacement controls even if the control is less control than an existing control, which may result in an increase in emissions'
  FULLSCC_ONLY:
    default: N
    description: Disables any sub-SCC cross-reference assignments that would otherwise be included in the cross-reference hierarchy. For example, the left-7, left-4, and left-2 levels of nonpoint and mobile SCCs would never be used. This is useful when zeros are a natural part of the SCC that the user does not want to assume are present for cross-reference hierarchy purposes. This option affects all Cntlmat input packets that use SCC assignments as part of their hierarchy.
  GCNTL:
    default: ''
    description: "(File) 6.6.1.1. /ALLOWABLE/ Packet 6.6.1.2. /CONTROL/ Packet 6.6.1.3. /CTG/ Packet 6.6.1.4. /MACT/ Packet 6.6.1.5. /PROJECTION/ Packet 6.6.1.6. /REACTIVITY/ Packet SMOKE uses growth and control packets to get the information needed for growth and control of emissions. A packet is a group of inputs used to apply specific types of controls. A single control file containing a series of packets can be shared by area, mobile, and point sources and the packets that do not apply to a given source category will be ignored. The following packets are recognized by the SMOKE control programs: /ALLOWABLE/ contains county-specific, SIC-specific, SCC-specific controls, caps, and replacement emissions. Contributes to the multiplicative control matrix. Section 6.6.1.1, \u201C/ALLOWABLE/ Packet\u201D /CONTROL/ contains settings for control efficiency, rule effectiveness, and rule penetration. Contributes to the multiplicative control matrix. Section 6.6.1.2, \u201C/CONTROL/ Packet\u201D\
      \ /CTG/ contains settings for CTG, MACT, and RACT controls. Contributes to the multiplicative control matrix. Section 6.6.1.3, \u201C/CTG/ Packet\u201D /MACT/ contains settings to support the primary MACT controls needed for toxics processing. Contributes to the multiplicative control matrix. Section 6.6.1.4, \u201C/MACT/ Packet\u201D /PROJECTION/ contains settings to permit growth of emission values into the past or future. Creates a growth matrix for each pollutant and/or activity. Section 6.6.1.5, \u201C/PROJECTION/ Packet\u201D /REACTIVITY/ contains settings needed for reactivity-based controls. Creates the reactivity control matrix. Section 6.6.1.6, \u201C/REACTIVITY/ Packet\u201D The formats for these packets are described in the section below. All of the packets are list-directed."
  GSPRO:
    default: ''
    description: "(File) The speciation profile file, GSPRO , contains the factors that are used to separate aggregated inventory pollutant emissions totals into emissions of model species required by the AQM. In traditional ozone air quality modeling, this file contained split factors only for VOC. In SMOKE, all inventory pollutants need to be represented in this file, even if it is only to indicate that a pollutant is not split into any model species (e.g., CO emissions would have a \u201C split factor \u201D of 1.0). The format of the GSPRO file is shown in Table 6.41, \u201CFormat for GSPRO \u201D . For support of combining criteria and toxic VOC using the NONHAPVOC calculation feature of SMOKE, the GSPRO file (starting in version 2.3 of SMOKE) includes a special header that defines the meaning of NONHAPVOC. This is the new #NHAP header, described below. This header keyword will be treated as a comment line by previous versions of SMOKE. The header lines define NONHAPVOC (and/or NONHAPTOG)\
      \ by listing all of the VOC compounds that were assumed to be removed from VOC (or TOG) when the speciation profile factors for NONHAPVOC (or NONHAPTOG) were calculated. When using this file, Spcmat compares this list with the list from the Inventory Table (\"VOC or TOG Component\" field = V or T and \"Explicit in Mechanism = \"N\"). This new header is included in this file so that the file is self-describing with respect to the definition of NONHAPVOC and NONHAPTOG. The format supports header lines (using a # symbol in position 1 of any line) in any part of the file."
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Cntlmat
  MCMAT:
    default: ''
    description: (File) Multiplicative control matrix
  MCREP:
    default: ''
    description: (File) Report of multiplicative controls applied to the inventory
  MCREP2:
    default: ''
    description: (File) Detailed before-and-after report of application of the /CONTROL/ packet only, which includes any comments appended to the end of the /CONTROL/ packet entries. These comments can describe the controls being applied with each packet row. This report then includes the base and future overall percent reductions on a source-by-source basis, and includes the CONTROL packet line-specific comments.
  MCSUMREP:
    default: ''
    description: (File) Report of all controls applied to the inventory, with all controls listed under each source
  MCTLWARN:
    default: ''
    description: (File) List of warnings
  MOBL:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  MPMAT:
    default: ''
    description: (File) Growth matrix
  MPROJREP:
    default: ''
    description: (File) Report of growth factors applied to the inventory
  MREACREP:
    default: ''
    description: (File) Report of reactivity controls applied to the inventory
  MRMAT_L:
    default: ''
    description: (File) Mole-based reactivity matrix
  MRMAT_S:
    default: ''
    description: (File) Mass-based reactivity matrix
  MRSUP:
    default: ''
    description: (File) Reactivity matrix supplemental file
  PCMAT:
    default: ''
    description: (File) Multiplicative control matrix
  PCREP:
    default: ''
    description: (File) Report of multiplicative controls applied to the inventory
  PCREP2:
    default: ''
    description: (File) Detailed before-and-after report of application of the /CONTROL/ packet only, which includes any comments appended to the end of the /CONTROL/ packet entries. These comments can describe the controls being applied with each packet row. This report then includes the base and future overall percent reductions on a source-by-source basis, and includes the CONTROL packet line-specific comments.
  PCSUMREP:
    default: ''
    description: (File) Report of all controls applied to the inventory, with all controls listed under each source
  PCTLWARN:
    default: ''
    description: (File) List of warnings
  PNTS:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  PPMAT:
    default: ''
    description: (File) Growth matrix
  PPROJREP:
    default: ''
    description: (File) Report of growth factors applied to the inventory
  PREACREP:
    default: ''
    description: (File) Report of reactivity controls applied to the inventory
  PRMAT_L:
    default: ''
    description: (File) Mole-based reactivity matrix
  PRMAT_S:
    default: ''
    description: (File) Mass-based reactivity matrix
  PROJECTION_YR_SPEC:
    default: Y
    description: 'Sets whether or not entries in the /PROJECTION/ packet are in year-specific format. Y: Year-specific format in use N: Year-specific format not in use'
  PRSUP:
    default: ''
    description: (File) Reactivity matrix supplemental file
  REACTIVITY_POL:
    default: VOC
    description: Sets the pollutant name to use in computing the reactivity matrix.
  REPORT_DEFAULTS:
    default: Y
    description: 'Defines whether or not the program reports when a source uses the default cross-reference. Y: List sources in the log file when they use default cross-reference N: Do not list sources that use the default cross-reference'
  SMK_AVEDAY_YN:
    default: N
    description: 'Indicates whether or not to read average day emissions instead of annual emissions from the inventory file. Y: Read average day emissions N: Do not read average day emissions, use annual emissions instead'
  SMK_SOURCE:
    default: blank
    description: 'Defines the type of sources to be processed. Valid values are A: Area processing B: Biogenic processing M: Mobile processing P: Point processing'
  SMK_TMPDIR:
    default: "\u201C . \u201D"
    description: Sets the path for writing the temporary files needed when processing the /ALLOWABLE/, /CONTROL/, /CTG/, /EMS_CONTROL/, /MACT/, and/or /PROJECTION/ packets (from the GCNTL file).
  SPEC_OUTPUT:
    default: ALL
    description: 'Defines the types of speciation outputs to create. MASS: Output speciation matrix based on mass MOLE: Output speciation matrix based on moles ALL: Output both mass and mole speciation matrices'
  XREF_SICOVERSCC:
    default: Y
    description: 'Determines how to deal with packet entries that have both an SCC and SIC Y: Match sources by SIC before SCC N: Match sources by SCC before SIC'
elevpoint:
  ELEV_WRITE_FAKE_SRC:
    default: Y
    description: 'Defines whether the program needs to add a fake source group or not when there is no an elevated source group to output. Y: Add a fake source group when there is no an elevated source group to output N: Do not add a fake source group.'
  ELEV_WRITE_LATLON:
    default: Y
    description: "Defines whether write the latitude and longitude information of special elevated or PinG sources to the stack groups file Section 7.3.2, \u201C STACK_GROUPS \u201D for air quality models CMAQ, and UAM-style. Y: Write the latitude and longitude information of elevated or PinG sources to the the stack group file. N: Do not write the latitude and longitude information of elevated or PinG sources to the the stack group file. The ELEV_WRITE_LATLON can not be N, when processing for PinG sources, since CMAQ does need the latitude and longitude to be included."
  GRIDDESC:
    default: ''
    description: (File) The GRIDDESC file is used to provide grid and projection information to SMOKE and can contain data for many different projections and many different grids. The format of the GRIDDESC file is available in the I/O API documentation at http://www.baronams.com/products/ioapi/GRIDDESC.html .
  G_RUNLEN:
    default: '240000'
    description: Simulation length (HHMMSS)
  G_STDATE:
    default: '0'
    description: Starting date of simulation (YYYYDDD)
  G_STTIME:
    default: '0'
    description: Starting time of simulation (HHMMSS)
  G_TSTEP:
    default: '10000'
    description: Time step (HHMMSS), only 10000 is allowed
  IOAPI_ISPH:
    default: '19'
    description: Determines which USGS spheroid to use for grid-based calculations This environment variable can also be used to set custom spheroid representations. See the I/O API documentation for more information.
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Elevpoint
  PELV:
    default: ''
    description: (File) Elevated point source identification file
  PELVCONFIG:
    default: ''
    description: "1: Use the \u201C Elevated \u201D section of the configuration file to select specific sources. This approach can be used for any of the model output formats - CMAQ and UAM-style. For UAM-style emissions processing, this environment variable must be set to 1 and the PELVCONFIG file will be used to select specific sources. This method of processing is needed for UAM and CAM X because they require use of the cutoff method discussed earlier. In rare cases of a very small inventory, it might be acceptable to specify 0 for this setting in UAM-style emissions processing, provided that you are sure that treating all sources as elevated sources in UAM-style models is acceptable. We do not recommend such an approach for typical SMOKE applications for UAM-style models."
  PNTS:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  PTMP:
    default: ''
    description: (File) Hourly emissions file produced by Temporal ; needed only when PELVCONFIG specifies emissions as one of the selection or grouping criteria and not using the PTMPLIST file
  PTMPLIST:
    default: ''
    description: "(File) The PTMPLIST file is an list file containing the full name and path of available hourly point source emissions files. This file is created automatically from the example SMOKE run scripts. Its format is shown in Table 6.83, \u201CFormat for PTMPLIST \u201D ."
  REPPELV:
    default: ''
    description: "(File) Type: ASCII - list-directed Summary: This ASCII output file contains the sources and criteria used for selecting elevated and PinG sources in SMOKE. The following is a description of columns/header in the report: Source ID: SMOKE source ID, used by SMOKE only Region: Country/state/county code (CSSYYY where C=country, SS=state, and YYY=county) Plant: Facility ID (FF10), Plant ID (ORL) Char 1: Unity ID (FF10), Point ID (ORL) Char 2: Release Point ID (FF10), Stack ID (ORL) Char 3: Process ID (FF10), Segment ID (ORL) Char 4: For IDA inventory, SCC Plt Name: Plant description from the input inventory Elevstat: Elevated status - P = plume-in-grid, E = elevated Group: SMOKE-assigned stack group number Stk Ht: Stack height in meters Stk Dm: Stack diameter in meters Stk Tmp: Stack exit gas temperature in K Stk Vel: Stack exit gas velocity in m/s Stk Flw: Stack exit gas flow rate in m 3 /s Rise: Briggs analytical solution plume rise in meters. This column is output only when\
      \ RISE is specified as a selection criterion in the PELVCONFIG input file. Group <pol>: Daily maximum emissions for source or source group for each pollutant (<pol>) in the PELVCONFIG file. These emissions are source emissions when a single source has its own group number. This column is output only when a pollutant is specified as a selection criterion in the PELVCONFIG input file. Var 1: The first variable from the PELVCONFIG input file that was used in establishing the source as a PinG/elevated source Type 1: If \u201C TOP \u201D was used in the PELVCONFIG input file, this field says \u201C RANK \u201D Test 1: The test used to establish this source as a PinG/elevated source (e.g., >, <, >=, =) Val 1: If TOP was used, this value is the RANK. Otherwise, this value is the criterion used with Var 1 and Test 1 (e.g., if Var 1 is HT, Test 1 is \u201C > \u201D, and if Val 1 is 50, then the criterion for selection is that the stack height be greater than 50. Var 2 through Val 2 are the\
      \ same as Var 1 through Val 1, except these are defined only if an AND condition existed for the OR condition that SMOKE used to establish the source as PinG or elevated. There will be as many variables of these types as there are AND conditions in the PELVCONFIG file."
  SMK_ELEV_METHOD:
    default: '0'
    description: "Defines the method to use in SMOKE for determining and processing elevated point sources. The setting chosen depends on the model output format needed from SMOKE. All PinG sources determined based on SMK_PING_METHOD will automatically be considered elevated sources (as defined specifically for the model for which you are creating emissions). 0: Treat all sources as potentially elevated, and let the Laypoint program determine which sources are elevated and which are not. This approach is appropriate only for SMOKE output for the CMAQ model. 1: Use the \u201C Elevated \u201D section of the PELVCONFIG configuration file to select specific sources. This approach can be used for any of the model output formats - CMAQ and UAM-style. For UAM-style emissions processing, this environment variable must be set to 1 and the PELVCONFIG file will be used to select specific sources. This method of processing is needed for UAM and CAM X because they require use of the cutoff method discussed\
      \ earlier. In rare cases of a very small inventory, it might be acceptable to specify 0 for this setting in UAM-style emissions processing, provided that you are sure that treating all sources as elevated sources in UAM-style models is acceptable. We do not recommend such an approach for typical SMOKE applications for UAM-style models. 2: Use the \u201C Elevated \u201D section of the PELVCONFIG configuration file to select specific sources. This approach can be used for in-line plume rise in CMAQ. Must set SMK_PING_METHOD = 0. For in-line plume rise processing in CMAQ, this environment variable must be set to 2 and the PELVCONFIG file will be used to select specific sources. To reduce the total number of plume rise calculations that would be done in the CMAQ in-line plume rise module, Elevpoint needs to group sources with nearly identical stack parameters. Elevpoint outputs stack group file that identifies elevated source locations and stack parameters for in-line plume rise calculation\
      \ in CMAQ. When using Smkmerge for in-line plume rise processing, MRG_LAYERS_YN must set to N to create hourly speciated 2-D surface layer emissions file. If SMKMERGE_CUSTOM_OUTPUT is set to Y, the output file for the in-line emissions is called INLNST_L ."
  SMK_PING_METHOD:
    default: '0'
    description: 'Defines the method to use in determining PinG point sources. 0: No PinG sources 1: Use PinG section of PELVCONFIG configuration file For all models that SMOKE supports use of PinG sources is optional. Some models may have limitations on the number of PinG sources supported, and you must make sure that these limitations are met; SMOKE does not automatically compare with these limitations, if any. For CMAQ, SMOKE will output a STACK_GROUPS file from the Elevpoint program and a PINGTS_[S|L] file from the Smkmerge program to support PinG. For UAM-style processing, SMOKE will flag PinG sources in the ASCII elevated file created by Smkmerge , and should be used with the SMK_ASCIIELEV_YN option set to Y to create this ASCII elevated file.'
  SMK_SOURCE:
    default: blank
    description: 'Defines the type of sources to be processed. Valid values are A: Area processing B: Biogenic processing M: Mobile processing P: Point processing.'
  STACK_GROUPS:
    default: ''
    description: "(File) Type: I/O API NetCDF - adapted gridded format Summary: I/O API intermediate file and output file for CMAQ. See Section 7.3.2, \u201C STACK_GROUPS \u201D for more information."
grdmat:
  AGMAT:
    default: ''
    description: (File) Gridding matrix containing the factors needed to spatially allocate the input emissions to the grid cells in the modeling domain.
  AGREF:
    default: ''
    description: "(File) The gridding cross-reference files are used to match the emissions sources with the spatial surrogates in the surrogates file. The way that of the gridding cross-reference files are applied in SMOKE ensures that the most-specific matches override the less-specific ones. A description of how the gridding cross-reference is applied to the inventory is provided in Section 4.4, \u201C Grdmat \u201D . The format of the AGREF and MGREF files is shown in Table 6.39, \u201CFormat for AGREF and MGREF \u201D ."
  AGSUP:
    default: ''
    description: (File) Gridding supplemental file containing spatial surrogate codes for each source
  AREA:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  FULLSCC_ONLY:
    default: N
    description: Disables any sub-SCC cross-reference assignments that would otherwise be included in the cross-reference hierarchy. For example, the left-7, left-4, and left-2 levels of nonpoint and mobile SCCs would never be used. This is useful when zeros are a natural part of the SCC that the user does not want to assume are present for cross-reference hierarchy purposes. This option affects all Cntlmat input packets that use SCC assignments as part of their hierarchy. In this context, this option prevents left-7 SCC assignments using the gridding cross-reference file.
  GRIDDESC:
    default: ''
    description: (File) The GRIDDESC file is used to provide grid and projection information to SMOKE and can contain data for many different projections and many different grids. The format of the GRIDDESC file is available in the I/O API documentation at http://www.baronams.com/products/ioapi/GRIDDESC.html .
  GRIDMASK:
    default: ''
    description: (File) Geographic level code and Timezone for each grid cell
  GRID_CRO_2D:
    default: ''
    description: (File) Layer definitions for the CMAQ model domain
  IMPORT_GRDNETCDF_YN:
    default: ''
    description: Y to read the native netCDF annual inventory files
  IOAPI_GRIDNAME_1:
    default: ''
    description: output modeling grid that global gridded inventory data is re-gridded to.
  IOAPI_ISPH:
    default: '19'
    description: Determines which USGS spheroid to use for grid-based calculations This environment variable can also be used to set custom spheroid representations. See the I/O API documentation for more information.
  LOGFILE:
    default: ''
    description: (File) Log generated from executing Grdmat
  MGMAT:
    default: ''
    description: (File) Gridding matrix containing the factors needed to spatially allocate the input emissions to the grid cells in the modeling domain.
  MGREF:
    default: ''
    description: (File) Gridding surrogate cross-reference file
  MGSUP:
    default: ''
    description: (File) Gridding supplemental file containing spatial surrogate codes for each source
  MOBL:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  PGMAT:
    default: ''
    description: (File) Gridding matrix containing the factors needed to spatially allocate the input emissions to the grid cells in the modeling domain.
  PNTS:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  REPORT_DEFAULTS:
    default: Y
    description: 'Defines whether or not the program reports when a source uses the default cross-reference. Y: List sources in the log file when they use default cross-reference N: Do not list sources that use the default cross-reference.'
  SMK_DEFAULT_SRGID:
    default: 100 (Models-3 population surrogate code)
    description: Mandatory, user MUST choose a fallback code.
  SMK_SOURCE:
    default: blank
    description: 'Defines the type of sources to be processed. Valid values are A: Area processing B: Biogenic processing M: Mobile processing P: Point processing.'
  SMK_USE_FALLBACK:
    default: ''
    description: "[Y/N] Defines the surrogate code number to use as a fallback surrogate when the surrogate number set by the cross-reference file would zero out the emissions for that source. This fallback surrogate is also used to define the country/state/county (FIPS) codes for use in Grdmat ; therefore, a fallback surrogate code is mandatory even if the SMK_USE_FALLBACK is set to [N]. This code should exist in the SRGDESC file and be representative on all country/state/counties. See description in Section 6.4.1, \u201C SRGDESC : Surrogate Designation, Description and Surrogate profile filename.\u201D ."
  SRGDESC:
    default: ''
    description: "(File) The Surrogate Description file is used to designate the regional location of the surrogate, the surrogate code number, a brief description of the code number and the Area and Mobile spatial surrogate file in which surrogate profile can be found. This file is located in SRGPRO_PATH . See Figure 4.4, \u201C Grdmat input and output files\u201D . The format of the SRGDESC file is shown in Table 6.37, \u201CFormat for SRGDESC \u201D ."
  SRGPRO_PATH:
    default: ''
    description: Defines the location of the Area and Mobile spatial surrogate files.
  SRGPRO_PATH/SURROGATE-FILES:
    default: ''
    description: (File) Gridding surrogate coefficients
grwinven:
  ACMAT_01:
    default: ''
    description: (File) Control or growth matrix output from Cntlmat ; total number of files is determined by SMK_NUM_CTLMAT setting
  ACMAT_02:
    default: ''
    description: (File) Additional control or growth matrices; total number of files is determined by SMK_NUM_CTLMAT setting
  AREA:
    default: ''
    description: (File) Intermediate inventory file produced by Smkinven
  AREA_O:
    default: ''
    description: (File) Annual and average-day inventory emissions and source characteristics
  ARINV_O:
    default: ''
    description: (File) Annual and average-day inventory emissions and source characteristics
  COSTCY:
    default: ''
    description: "(File) The COSTCY file is used to assign numeric codes to the various countries, states, and counties to be modeled; the file also provides information concerning default time zones and Daylight Savings observance. A header line can be used in this file to indicate that population data are contained in the file as the last column on each line of the /COUNTY/ packet. The header line and additional population column are optional. If it is present in the file, it must be on the first line of the file and use the following syntax: #POPULATION <year> where <year> is a 4-digit year. The country, state, and county codes in each section of this file must be sorted in increasing order. If they are not, the programs reading this file will give an error. The format of the COSTCY file is shown in Table 6.85, \u201CFormat for COSTCY \u201D ."
  GEOCODE_LEVEL1:
    default: ''
